<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="#6c5cc8"/>

  <!-- Sparkle top-right -->
  <circle cx="390" cy="100" r="10" fill="#fbbf24" opacity="0.9"/>
  <circle cx="420" cy="72" r="6" fill="#fbbf24" opacity="0.7"/>
  <circle cx="365" cy="75" r="5" fill="#fbbf24" opacity="0.6"/>

  <!-- Piggy bank body -->
  <ellipse cx="248" cy="300" rx="130" ry="115" fill="#f9d8c0"/>

  <!-- Ear -->
  <ellipse cx="168" cy="210" rx="30" ry="24" fill="#f9d8c0"/>
  <ellipse cx="168" cy="212" rx="18" ry="14" fill="#f0b8a0"/>

  <!-- Snout -->
  <ellipse cx="355" cy="315" rx="42" ry="36" fill="#f0b8a0"/>
  <circle cx="342" cy="318" r="9" fill="#d48a70" opacity="0.8"/>
  <circle cx="368" cy="318" r="9" fill="#d48a70" opacity="0.8"/>

  <!-- Eye -->
  <circle cx="295" cy="258" r="12" fill="white"/>
  <circle cx="297" cy="258" r="7" fill="#2d2450"/>
  <circle cx="300" cy="255" r="2.5" fill="white"/>

  <!-- Coin slot on top -->
  <rect x="218" y="175" width="56" height="10" rx="5" fill="#5040a0"/>

  <!-- Gold coin going in -->
  <ellipse cx="246" cy="175" rx="22" ry="10" fill="#fbbf24"/>
  <ellipse cx="246" cy="172" rx="22" ry="10" fill="#fcd34d"/>
  <text x="246" y="177" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e" font-family="Arial">€</text>

  <!-- Leg -->
  <rect x="195" y="388" width="30" height="42" rx="14" fill="#f9d8c0"/>
  <rect x="245" y="395" width="30" height="38" rx="14" fill="#f9d8c0"/>
  <rect x="295" y="395" width="30" height="38" rx="14" fill="#f9d8c0"/>

  <!-- Tail curl -->
  <path d="M 118 295 Q 90 270 105 245 Q 120 220 105 205" fill="none" stroke="#f0b8a0" stroke-width="10" stroke-linecap="round"/>

  <!-- Star sparkle left -->
  <text x="95" y="200" font-size="36" opacity="0.85">⭐</text>
</svg>
