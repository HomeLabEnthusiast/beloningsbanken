/* Hook — returns true when device is in landscape orientation */
function useOrientation() {
  const isLandscape = () =>
    typeof screen !== "undefined" && screen.orientation
      ? screen.orientation.type.includes("landscape")
      : window.innerWidth > window.innerHeight;

  const [landscape, setLandscape] = React.useState(isLandscape());

  React.useEffect(() => {
    const update = () => setLandscape(isLandscape());
    window.addEventListener("resize", update);
    window.addEventListener("orientationchange", update);
    if (screen.orientation) screen.orientation.addEventListener("change", update);
    return () => {
      window.removeEventListener("resize", update);
      window.removeEventListener("orientationchange", update);
      if (screen.orientation) screen.orientation.removeEventListener("change", update);
    };
  }, []);

  return landscape;
}

// Returns true if color is light enough to need dark text
const needsDarkText = (hex) => {
  const h = hex.replace('#','');
  const r = parseInt(h.slice(0,2),16)/255;
  const g = parseInt(h.slice(2,4),16)/255;
  const b = parseInt(h.slice(4,6),16)/255;
  const lum = 0.299*r + 0.587*g + 0.114*b;
  return lum > 0.55;
};

const getTheme = (child) => {
  if (child.bg && !CHILD_THEMES.find(t => t.bg === child.bg)) {
    const hex = child.bg.replace('#','');
    const r = parseInt(hex.slice(0,2),16);
    const g = parseInt(hex.slice(2,4),16);
    const b = parseInt(hex.slice(4,6),16);
    // Accent for UI elements — darken 30%
    const dr = Math.round(r*0.7), dg = Math.round(g*0.7), db = Math.round(b*0.7);
    const accent = '#'+[dr,dg,db].map(v=>v.toString(16).padStart(2,'0')).join('');
    // UI bg tint — very light (mix 15% of color with white)
    const tr = Math.round(r*0.15+255*0.85);
    const tg = Math.round(g*0.15+255*0.85);
    const tb = Math.round(b*0.15+255*0.85);
    const bgTint = '#'+[tr,tg,tb].map(v=>v.toString(16).padStart(2,'0')).join('');
    // Chip bg — slightly more color (25%)
    const cr = Math.round(r*0.25+255*0.75);
    const cg = Math.round(g*0.25+255*0.75);
    const cb2 = Math.round(b*0.25+255*0.75);
    const chip = '#'+[cr,cg,cb2].map(v=>v.toString(16).padStart(2,'0')).join('');
    return {
      headerBg: child.bg,     // header background only — used via cTheme.headerBg||cTheme.accent → we override below
      bg: bgTint,             // very light tint for UI elements (rows, chips bg)
      border: chip,
      accent,                 // darker shade for text, borders, progress
      text: accent,
      chip,
      chipText: accent,
      headerText: "white",
      headerTextSub: "rgba(255,255,255,0.8)"
    };
  }
  const t = CHILD_THEMES.find(t => t.id === child.theme) || CHILD_THEMES[0];
  return { ...t, headerBg: t.accent, headerText:"white", headerTextSub:"rgba(255,255,255,0.8)" };
};

const saveSession = (routineSessions, timerStates, view, activeChild) => {
  try {
    const pausedRoutines = {};
    Object.entries(routineSessions).forEach(([id, s]) => {
      pausedRoutines[id] = s ? {...s, running: false} : s;
    });
    const pausedTimers = {};
    Object.entries(timerStates).forEach(([id, t]) => {

      routineSessions: pausedRoutines,
      timerStates: pausedTimers,
      view: view || "home",
      activeChild: activeChild || null
    }));

/* Compress image to max 300px JPEG at 65% quality — reduces ~2MB → ~20KB */
const compressImage = (dataUrl, callback) => {
  const img = new Image();
  img.onload = () => {
    const MAX = 300;
    let w = img.width, h = img.height;
    if (w > MAX || h > MAX) {
      if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
      else       { w = Math.round(w * MAX / h); h = MAX; }
    }
    const canvas = document.createElement("canvas");
    canvas.width = w; canvas.height = h;
    canvas.getContext("2d").drawImage(img, 0, 0, w, h);
    callback(canvas.toDataURL("image/jpeg", 0.65));
  };
  img.src = dataUrl;
};

// Derives an "aura" from today's activity history
function getLivingAvatar(child) {
  const today = new Date().toLocaleDateString("sv-SE");
  const todayHistory = (child.history||[]).filter(h => h.date === today);
  const acts = todayHistory.map(h => h.activity);
  const totalToday = todayHistory.reduce((s,h) => s+(h.minutes||0), 0);

  // Pick dominant badge based on what they did today
  if (acts.includes("reading")  && todayHistory.find(h=>h.activity==="reading" && h.minutes>=15))
    return { badge:"📖", glow:"#0d9488", label:"Läshjälten!", shimmer:false };
  if (acts.includes("cleaning") && todayHistory.find(h=>h.activity==="cleaning"))
    return { badge:"✨", glow:"#f59e0b", label:"Städstjärnan!", shimmer:true };
  if (acts.includes("exercise") && todayHistory.find(h=>h.activity==="exercise"))
    return { badge:"💪", glow:"#8b5cf6", label:"Sporthjälten!", shimmer:false };
  if (totalToday >= 30)
    return { badge:"🔥", glow:"#ef4444", label:"På fire idag!", shimmer:false };
  if (totalToday > 0)
    return { badge:"⭐", glow:"#fbbf24", label:"Bra start!", shimmer:false };
  return null;
}

  const bonusLabels = ["Dubbla poäng! x2", "+50% extrapoäng!", "Bonustid!", "Stjärnbonus!", "Superdags!"];

    const s    = seed + idx * 7;
    const mins = minOptions[s % minOptions.length];
    const bonus = bonusLabels[s % bonusLabels.length];
    return { act, mins, bonus };
  });
}

/* Animated SVG hourglass */
function HourglassAnim({ pct, color }) {
  // pct = 0 (full) → 1 (empty/done)
  const sandTop    = Math.max(0, 1 - pct);   // sand remaining in top
  const sandBottom = Math.min(1, pct);        // sand accumulated in bottom
  const w = 36, h = 56;
  // top trapezoid sand fill (SVG clip)
  const topH   = 18 * sandTop;

/* The in-card reward countdown widget */
function ActiveRewardWidget({ reward, onPause, onCancel, onDone }) {
  const totalSec = (reward.durationMin || reward.cost) * 60;

  // LOCAL state for paused — avoids prop feedback loop causing flicker
  const [isPaused, setIsPaused] = useState(reward.paused || false);

  // Calculate true elapsed using wall-clock time so background ticking works
  const calcElapsed = () => {
    if (reward.paused || !reward.startedAt) return reward.elapsed || 0;
    const wallElapsed = Math.floor((Date.now() - reward.startedAt) / 1000);
    return Math.min(totalSec, (reward.elapsed || 0) + wallElapsed);
  };

  const [secs, setSecs]  = useState(calcElapsed);
  const intervalRef      = useRef(null);
  const secsRef          = useRef(secs);
  const isPausedRef      = useRef(isPaused);
  const cancelledRef     = useRef(false);
  const doneCalledRef    = useRef(false);  // guard: onDone fires exactly once

  // Safe wrapper — guarantees onDone is called at most once
  const fireDone = () => {
    if (doneCalledRef.current) return;
    doneCalledRef.current = true;
    clearInterval(intervalRef.current);
    onDone();
  };

  useEffect(() => { secsRef.current   = secs;     }, [secs]);
  useEffect(() => { isPausedRef.current = isPaused; }, [isPaused]);

  // Start/stop interval based on isPaused
  useEffect(() => {
    clearInterval(intervalRef.current);
    if (!isPaused) {
      intervalRef.current = setInterval(() => {
        // Read secs from ref to avoid stale closure
        const next = secsRef.current + 1;
        if (next >= totalSec) {
          setSecs(totalSec);
          fireDone();
        } else {
          setSecs(next);
        }
      }, 1000);
    }
    return () => clearInterval(intervalRef.current);
  }, [isPaused]);

  // On first mount: correct time from wall clock
  useEffect(() => {
    const corrected = calcElapsed();
    if (corrected >= totalSec) { fireDone(); return; }
    setSecs(corrected);
  }, []);

  // Sync to localStorage every 5 seconds
  useEffect(() => {
    const syncRef = setInterval(() => onPause(secsRef.current, isPausedRef.current), 5000);
    return () => {
      clearInterval(syncRef);
      // Save on unmount only if not cancelled AND reward not already done
      if (!cancelledRef.current && !doneCalledRef.current) onPause(secsRef.current, isPausedRef.current);
    };

    const next = !isPaused;

/* FAMILY TARGET SECTION */
function FamilyTargetSection({familyTarget, setFamilyTarget, child, updateChild, showToast, allChildren}) {
  const [showAllocate, setShowAllocate] = React.useState(false);
  const [allocAmt, setAllocAmt] = React.useState("");
  const [showCelebration, setShowCelebration] = React.useState(false);
  const [showEdit, setShowEdit] = React.useState(false);
  const [showDeleteConfirm, setShowDeleteConfirm] = React.useState(false);
  const [editName, setEditName] = React.useState("");
  const [editCost, setEditCost] = React.useState("");
  const [editImage, setEditImage] = React.useState(null);
  const editImgRef = React.useRef(null);

  if (!familyTarget) return null;

  const totalCollected = (allChildren||[]).reduce((s,k) => s+(k.familyPoints||0), 0);
  const pct   = familyTarget.cost > 0 ? Math.min(1, totalCollected/familyTarget.cost) : 0;
  const done  = totalCollected >= familyTarget.cost;
  const bank  = child.points || 0;
  const space = Math.max(0, familyTarget.cost - totalCollected);
  const myPts = child.familyPoints || 0;

  const openEdit = () => {
    setEditName(familyTarget.name);
    setEditCost(String(familyTarget.cost));
    setEditImage(familyTarget.image || null);
    setShowEdit(true);
    setShowAllocate(false);
  };

  const saveEdit = () => {
    const cost = parseInt(editCost);
    if (!editName.trim() || !cost || cost < 1) return;
    if (setFamilyTarget) setFamilyTarget({...familyTarget, name:editName.trim(), cost, image:editImage});
    setShowEdit(false);
    showToast("Familjemål uppdaterat!");
  };

  const confirmAllocate = () => {
    const amt = parseInt(allocAmt);
    if (!amt || amt <= 0) return;
    const actual = Math.min(amt, bank, space);
    if (actual <= 0) { showToast("Inte tillräckligt med poäng!"); return; }
    updateChild(child.id, { points: bank - actual, familyPoints: myPts + actual });
    if ((totalCollected + actual) >= familyTarget.cost) setTimeout(() => setShowCelebration(true), 400);
    showToast("+" + actual + " poäng bidragit till familjemål!");
    setShowAllocate(false); setAllocAmt("");

  return React.createElement("div", {style:{marginBottom:12}}
    , showCelebration && React.createElement(FamilyGoalCelebration, {

/* ═══════════════ HOLD TO STOP ══════════════════════════════════════════════ */
function HoldToStop({ onStop, color, compact, pillBar }) {
  const [progress, setProgress] = React.useState(0);
  const intervalRef = React.useRef(null);
  const firedRef = React.useRef(false);
  const HOLD_MS = 1800, TICK = 30;
  const startHold = () => {
    if (intervalRef.current) return;
    firedRef.current = false;
    intervalRef.current = setInterval(() => {
      setProgress(p => {
        const next = p + (TICK / HOLD_MS) * 100;
        if (next >= 100) {
          clearInterval(intervalRef.current); intervalRef.current = null;
          if (!firedRef.current) { firedRef.current = true; onStop(); }
          return 0;
        }
        return next;
      });
    }, TICK);
  };
  const cancelHold = () => { clearInterval(intervalRef.current); intervalRef.current = null; setProgress(0); };
  React.useEffect(() => { return () => { clearInterval(intervalRef.current); }; }, []);
  const size = 64, radius = 28;
  const circ = 2 * Math.PI * radius;
  const offset = circ * (1 - progress / 100);
  if (pillBar) return (
    React.createElement('button', {
      className: "hold-stop",
      onContextMenu: e => e.preventDefault(),
      onMouseDown: startHold, onMouseUp: cancelHold, onMouseLeave: cancelHold,
      onTouchStart: e => { e.preventDefault(); startHold(); },
      onTouchEnd: cancelHold, onTouchCancel: cancelHold,
      style: {
        background: "none", border: "none",
        width: "100%", padding: "10px 0",
        fontSize: 12, fontWeight: 500,
        color: "#b91c1c", cursor: "pointer",
        display: "flex", alignItems: "center", justifyContent: "center", gap: 5,
        position: "relative", overflow: "hidden"}},
      progress > 0 && React.createElement('div', {style:{
        position:"absolute", left:0, top:0, height:"100%",
        width: progress+"%", background:"rgba(185,28,28,0.08)",
        transition:"width 0.03s linear"}}),
      React.createElement('span', {style:{fontSize:13}}, "⏹"),
      " Håll för stopp"
    )
  );
  return React.createElement('div', {style:{display:"flex",flexDirection:"column",alignItems:"center",gap:5}}
    , React.createElement('div', {style:{position:"relative",width:size,height:size}}
      , React.createElement('svg', {width:size,height:size,style:{position:"absolute",top:0,left:0,transform:"rotate(-90deg)"}}
        , React.createElement('circle', {cx:size/2,cy:size/2,r:radius,fill:"none",stroke:"#e2e8f0",strokeWidth:4})
        , React.createElement('circle', {cx:size/2,cy:size/2,r:radius,fill:"none",stroke:color||"#ef4444",strokeWidth:4,
            strokeDasharray:circ,strokeDashoffset:offset,strokeLinecap:"round",
            style:{transition:"stroke-dashoffset 0.03s linear"}})
      )
      , React.createElement('button', {
          className: "hold-stop",
          onContextMenu: e => e.preventDefault(),
          onMouseDown:startHold, onMouseUp:cancelHold, onMouseLeave:cancelHold,
          onTouchStart:e=>{e.preventDefault();startHold();}, onTouchEnd:cancelHold, onTouchCancel:cancelHold,
          style:{position:"absolute",inset:4,
            background:progress>0?"linear-gradient(135deg,#ef4444,#dc2626)":"#f8fafc",
            border:"none",borderRadius:"50%",cursor:"pointer",
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,
            transition:"background 0.15s",
            boxShadow:progress>0?"0 4px 14px rgba(239,68,68,0.4)":"none"}},
          "⏹"
        )
    )
    , React.createElement('span', {style:{fontSize:10,fontWeight:800,color:"#8e8e93",textAlign:"center"}},
        progress>0 ? "Släpp för att avbryta…" : "Håll inne för stopp"
      )
  );
}

/* ── Per-child time adjuster (isolated state) ── */
function ChildTimeAdjuster({child, onAdjust, label, color}) {
  const lbl = label || "⏱ MIN";
  const clr = color || "#0d9488";
  const isPoints = lbl.includes("POÄNG");
  const current = isPoints ? (child.points||0) : (child.balance||0);
  const [inputVal, setInputVal] = React.useState("");

  const parsed = parseInt(inputVal) || 0;
  const preview = current + parsed;

  const quickApply = (delta) => {
    onAdjust(child.id, delta);
  };

  const applyInput = () => {
    if (parsed === 0) return;
    onAdjust(child.id, parsed);
    setInputVal("");
  };

  const QUICK = [1, 5, 10, -5, -10];

  return React.createElement('div', {style:{marginBottom:12}}

    /* Label + current value */
    , React.createElement('div', {style:{display:"flex", alignItems:"center",
        justifyContent:"space-between", marginBottom:6}}
      , React.createElement('span', {style:{fontSize:11, fontWeight:700, color:"#8e8e93",
          letterSpacing:".06em", textTransform:"uppercase"}}, lbl)
      , React.createElement('span', {style:{fontSize:13, fontWeight:800, color:clr}},
          current + (isPoints ? " ⭐" : " min"))
    )

    /* Quick buttons */
    , React.createElement('div', {style:{display:"flex", gap:4, flexWrap:"wrap", marginBottom:8}}
      , QUICK.map(v =>
          React.createElement('button', {key:v, className:"btn-big",
            onClick: () => quickApply(v),
            style:{flex:"1 1 auto", padding:"8px 4px", borderRadius:9, border:"none",
              cursor:"pointer", fontWeight:800, fontSize:12,
              background: v > 0 ? "#dcfce7" : "#fee2e2",
              color: v > 0 ? "#15803d" : "#b91c1c",
              minWidth:40}},
            (v > 0 ? "+" : "") + v)
        )
    )

    /* Direct input + apply */
    , React.createElement('div', {style:{display:"flex", gap:6, alignItems:"stretch"}}
      , React.createElement('div', {style:{flex:1, position:"relative"}}
        , React.createElement('input', {
            type:"number",
            value: inputVal,
            onChange: e => setInputVal(e.target.value),
            onKeyDown: e => e.key === "Enter" && applyInput(),
            placeholder: "Exakt värde (+ eller −)…",
            style:{width:"100%", border:".5px solid rgba(0,0,0,0.12)",
              borderRadius:10, padding:"9px 12px", fontSize:14,
              boxSizing:"border-box",
              borderColor: parsed !== 0 ? clr : "rgba(0,0,0,0.12)"}})
        /* Live preview */
        , parsed !== 0 && React.createElement('div', {style:{
            position:"absolute", right:10, top:"50%",
            transform:"translateY(-50%)",
            fontSize:11, fontWeight:700,
            color: preview >= 0 ? "#15803d" : "#b91c1c"}},
            "→ " + preview)
      )
      , React.createElement('button', {
          onClick: applyInput,
          disabled: parsed === 0,
          style:{padding:"9px 14px", borderRadius:10, border:"none",
            cursor: parsed === 0 ? "default" : "pointer",
            fontWeight:800, fontSize:13, flexShrink:0,
            background: parsed === 0 ? "#f2f2f7" : parsed > 0 ? clr : "#ef4444",
            color: parsed === 0 ? "#aeaeb2" : "white"}},
          parsed > 0 ? "+" + parsed : parsed < 0 ? parsed : "Ange")
    )
  );
}

function RoutineSplitView({kids, routineSessions, setRoutineSessions, updateChild, data, setView, setActiveChild, setRoutineFromSplit, onBack}) {

  const fmt = (s) => {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return m + ":" + String(sec).padStart(2, "0");
  };

  /* ── Responsive layout ── */
  const [winSize, setWinSize] = React.useState({w: window.innerWidth, h: window.innerHeight});
  React.useEffect(() => {
    const onResize = () => setWinSize({w: window.innerWidth, h: window.innerHeight});
    window.addEventListener("resize", onResize);
    window.addEventListener("orientationchange", () => setTimeout(onResize, 100));
    return () => { window.removeEventListener("resize", onResize); };
  }, []);
  const isPortrait  = winSize.w < 640;
  const isCompact   = winSize.w < 900;
  const isLandscape = winSize.w >= 640 && winSize.h < 500;
  const cardPad     = isPortrait ? "10px 8px"  : "14px";
  const cardFlex    = isPortrait ? "1 1 auto"  : "1 1 0";
  const cardMinW    = isPortrait ? "100%"      : "0";
  const innerDir    = isPortrait ? "column"    : "row";
  const stepColW    = isPortrait ? "100%"      : isLandscape ? "42%" : "38%";
  const headerFs    = isPortrait ? 14          : 15;
  const bubbleSize  = isPortrait ? 36          : 44;
  const timerFs     = isPortrait ? 24          : 30;
  const stepFs      = isPortrait ? 13          : isCompact ? 13 : 14;
  const stepPad     = isPortrait ? "6px 8px"   : "7px 8px";
  const stepGap     = isPortrait ? 5            : 6;
  const listMaxH    = isPortrait ? "none"       : isLandscape ? "260px" : "none";

  const handleToggle = (childId) => {
    setRoutineSessions(s => ({...s,
      [childId]: {...s[childId], running: !s[childId].running}
    }));
  };

  /* Advance current child's step: mark as completed, go to next (or finish) */
  const handleComplete = (childId) => {
    const s = routineSessions[childId];
    if (!s) return;
    const steps = s.routine.steps || [];
    // Deduplicate: only add stepIdx if not already in completed
    const newCompleted = s.completed.includes(s.stepIdx) ? [...s.completed] : [...s.completed, s.stepIdx];

    if (s.stepIdx + 1 >= steps.length) {
      /* All steps done */
      const uniqueNew = [...new Set(newCompleted)];
      const c = (data.children||[]).find(x => x.id === childId);
      if (c) {
        const earnedMins   = uniqueNew.reduce((a,i) => { const m=steps[i].mode||"timer"; return a+((m==="timer"||m==="tid")?(steps[i].minutes||0):0); }, 0);
        const earnedPoints = uniqueNew.reduce((a,i) => { const m=steps[i].mode||"timer"; return a+(m==="points"?(steps[i].points||0):0); }, 0);
        const bonus     = uniqueNew.length === steps.length ? (s.routine.bonus||0)    : 0;
        const bonusMins = uniqueNew.length === steps.length ? (s.routine.bonusMins||0) : 0;
        const historyEntries = uniqueNew.map(i => ({
          id: Date.now()+i+Math.random(), activity: steps[i].actId||steps[i].label,
          label: steps[i].label, icon: steps[i].icon||"⚡",
          minutes: (()=>{ const m=steps[i].mode||"timer"; return (m==="timer"||m==="tid") ? (steps[i].minutes||0) : 0; })(),
          points:  (()=>{ const m=steps[i].mode||"timer"; return m==="points" ? (steps[i].points||0) : 0; })(),
          mode: steps[i].mode||"timer",
          fromRoutine: true, routineName: s.routine.name||"Rutin",
          date: new Date().toLocaleDateString("sv-SE")
        }));
        updateChild(childId, {
          balance: (c.balance||0)+earnedMins+bonusMins,
          points:  (c.points||0)+earnedPoints+bonus,
          history: [...historyEntries, ...(c.history||[])]
        });
      }
      setRoutineSessions(ss => ({...ss, [childId]: {...s, completed: uniqueNew, done:true, running:false}}));
    } else {
      setRoutineSessions(ss => ({...ss,
        [childId]: {...s, completed: newCompleted, stepIdx: s.stepIdx+1, secs:0, running:false}
      }));
    }
  };

  const handleUncheck = (childId, stepI) => {
    setRoutineSessions(ss => {
      const s = ss[childId];
      if (!s) return ss;
      const newCompleted = s.completed.filter(c => c !== stepI);
      const newIdx = stepI <= s.stepIdx ? stepI : s.stepIdx;
      return {...ss, [childId]: {...s, completed: newCompleted, stepIdx: newIdx, secs: 0, running: false}};
    });
  };

  const handleCheck = (childId, stepI) => {
    setRoutineSessions(ss => {
      const s = ss[childId];
      if (!s) return ss;
      const steps = s.routine.steps || [];
      const newCompleted = s.completed.includes(stepI) ? s.completed : [...s.completed, stepI];
      const allNowDone = newCompleted.length === steps.length;
      // If all done, stay at last step — let handleComplete handle the finish
      if (allNowDone) {
        return {...ss, [childId]: {...s, completed: newCompleted, stepIdx: steps.length - 1, secs: 0, running: false}};
      }
      // Advance to next unchecked step
      let nextIdx = s.stepIdx;
      for (let j = 0; j < steps.length; j++) {
        if (!newCompleted.includes(j)) { nextIdx = j; break; }
      }
      return {...ss, [childId]: {...s, completed: newCompleted, stepIdx: nextIdx, secs: 0, running: false}};
    });
  };

  const handleDismiss = (childId) => {

function EmojiLibraryAdmin({data, setData, showToast}) {
  const library = data.emojiLibrary || [];
  const [view,        setView]        = React.useState("list"); // "list" | "edit-cat"
  const [editCat,     setEditCat]     = React.useState(null);   // {id, name, emojis:[]}
  const [newCatName,  setNewCatName]  = React.useState("");
  const [newEmoji,    setNewEmoji]    = React.useState("");
  const [deleteId,    setDeleteId]    = React.useState(null);

  const saveLibrary = (updated) => setData(d => ({...d, emojiLibrary: updated}));

  const addCategory = () => {
    if (!newCatName.trim()) return;
    const cat = {id:"ec"+Date.now(), name:newCatName.trim(), emojis:[]};
    saveLibrary([...library, cat]);
    setNewCatName("");
    showToast("✅ Kategori skapad!");
  };

  const deleteCategory = (id) => {
    saveLibrary(library.filter(c => c.id !== id));
    setDeleteId(null);
    showToast("🗑 Kategori borttagen");
  };

  const openEdit = (cat) => { setEditCat({...cat, emojis:[...cat.emojis]}); setView("edit-cat"); setNewEmoji(""); };

  const saveCat = () => {
    saveLibrary(library.map(c => c.id === editCat.id ? editCat : c));
    setView("list"); setEditCat(null);
    showToast("✅ Sparat!");
  };

  const addEmojiToCat = () => {
    const trimmed = newEmoji.trim();
    if (!trimmed) return;
    // Split in case user pastes multiple emoji
    const arr = [...new Intl.Segmenter().segment(trimmed)].map(s=>s.segment).filter(s=>s.trim());
    const unique = arr.filter(e => !editCat.emojis.includes(e));
    if (!unique.length) { showToast("Emoji finns redan!"); return; }
    setEditCat(c => ({...c, emojis:[...c.emojis, ...unique]}));
    setNewEmoji("");
  };

  const removeEmojiFromCat = (emoji) => {
    setEditCat(c => ({...c, emojis: c.emojis.filter(e => e !== emoji)}));
  };

  const moveEmojiToOtherCat = (emoji, targetCatId) => {
    const updated = library.map(c => {
      if (c.id === editCat.id) return {...c, emojis: c.emojis.filter(e => e !== emoji)};
      if (c.id === targetCatId) return {...c, emojis: [...c.emojis, emoji]};
      return c;
    });
    saveLibrary(updated);
    setEditCat(updated.find(c => c.id === editCat.id));
  };

  /* ── Edit category view ── */
  if (view === "edit-cat" && editCat) return React.createElement("div", {className:"fade-up"}
    , React.createElement("div", {style:{display:"flex", alignItems:"center", gap:10, marginBottom:16}}
      , React.createElement("button", {onClick:()=>{ setView("list"); setEditCat(null); },
          style:{background:"#f2f2f7", border:"none", borderRadius:50, width:34, height:34,
            cursor:"pointer", fontSize:16, display:"flex", alignItems:"center", justifyContent:"center"}}, "←")
      , React.createElement("div", {style:{fontSize:15, fontWeight:800, color:"#1c1c1e"}}, editCat.name)
    )

    /* Add emoji input */
    , React.createElement("div", {style:{background:"white", borderRadius:14, padding:"14px 16px",
        border:".5px solid rgba(0,0,0,0.08)", marginBottom:12}}
      , React.createElement("div", {style:{fontSize:11, fontWeight:700, color:"#8e8e93",
          letterSpacing:".06em", textTransform:"uppercase", marginBottom:8}}, "Lägg till emoji")
      , React.createElement("div", {style:{display:"flex", gap:8}}
        , React.createElement("input", {
            value: newEmoji,
            onChange: e => setNewEmoji(e.target.value),
            onKeyDown: e => e.key==="Enter" && addEmojiToCat(),
            placeholder: "Klistra in emoji här… 🌟⚡🎨",
            style:{flex:1, border:".5px solid rgba(0,0,0,0.1)", borderRadius:12,
              padding:"10px 14px", fontSize:20, boxSizing:"border-box"}})
        , React.createElement("button", {onClick: addEmojiToCat,
            style:{background:"#6c5cc8", border:"none", borderRadius:12, padding:"10px 16px",
              color:"white", fontWeight:800, fontSize:14, cursor:"pointer", flexShrink:0}},
            "+ Lägg till")
      )
      , React.createElement("div", {style:{fontSize:11, color:"#8e8e93", marginTop:6}},
          "Tips: du kan klistra in flera emoji på en gång")
    )

    /* Emoji grid */
    , editCat.emojis.length > 0 && React.createElement("div", {style:{background:"white", borderRadius:14,
        padding:"14px 16px", border:".5px solid rgba(0,0,0,0.08)", marginBottom:12}}
      , React.createElement("div", {style:{fontSize:11, fontWeight:700, color:"#8e8e93",
          letterSpacing:".06em", textTransform:"uppercase", marginBottom:10}},
          editCat.emojis.length + " emoji")
      , React.createElement("div", {style:{display:"flex", flexWrap:"wrap", gap:8}}
        , editCat.emojis.map(e =>
            React.createElement("div", {key:e,
              style:{position:"relative", display:"inline-flex"}}
              , React.createElement("div", {
                  style:{fontSize:28, width:48, height:48, borderRadius:12,
                    background:"#f8f7f5", border:".5px solid rgba(0,0,0,0.08)",
                    display:"flex", alignItems:"center", justifyContent:"center",
                    cursor:"default", WebkitTouchCallout:"none", userSelect:"none"}},
                  e)
              , React.createElement("button", {
                  onClick: () => removeEmojiFromCat(e),
                  style:{position:"absolute", top:-6, right:-6, width:18, height:18,
                    borderRadius:"50%", background:"#b91c1c", border:"none",
                    color:"white", fontSize:10, cursor:"pointer",
                    display:"flex", alignItems:"center", justifyContent:"center",
                    lineHeight:1, fontWeight:800}}, "✕")
            )
          )
      )

      /* Move to other category */
      , library.filter(c => c.id !== editCat.id).length > 0 && React.createElement("div", {style:{marginTop:12}}
        , React.createElement("div", {style:{fontSize:11, color:"#8e8e93", fontWeight:600, marginBottom:6}},
            "Flytta emoji till annan kategori: tryck på emoji och välj målkategori")
      )
    )

    , editCat.emojis.length === 0 && React.createElement("div", {style:{
        background:"white", borderRadius:14, padding:"24px 16px",
        border:".5px solid rgba(0,0,0,0.08)", textAlign:"center",
        color:"#8e8e93", fontSize:13, marginBottom:12}},
        "Inga emoji än — klistra in ovan")

    /* Save */
    , React.createElement("div", {style:{display:"flex", gap:10}}
      , React.createElement("button", {onClick: saveCat,
          style:{flex:1, background:"#6c5cc8", border:"none", borderRadius:12,
            padding:"13px", color:"white", fontWeight:800, fontSize:15, cursor:"pointer"}},
          "💾 Spara kategori")
      , React.createElement("button", {onClick:()=>{ setView("list"); setEditCat(null); },
          style:{padding:"13px 18px", background:"#f2f2f7", border:"none",
            borderRadius:12, cursor:"pointer", fontWeight:700, fontSize:14}}, "Avbryt")
    )
  );

  /* ── List view ── */
  return React.createElement("div", {className:"fade-up"}

    , React.createElement("div", {style:{fontSize:15, fontWeight:800, color:"#1c1c1e", marginBottom:16}},
        "Mitt emoji-bibliotek")

    /* Add new category */
    , React.createElement("div", {style:{background:"white", borderRadius:14, padding:"14px 16px",
        border:".5px solid rgba(0,0,0,0.08)", marginBottom:12}}
      , React.createElement("div", {style:{fontSize:11, fontWeight:700, color:"#8e8e93",
          letterSpacing:".06em", textTransform:"uppercase", marginBottom:8}}, "Ny kategori")
      , React.createElement("div", {style:{display:"flex", gap:8}}
        , React.createElement("input", {
            value: newCatName,
            onChange: e => setNewCatName(e.target.value),
            onKeyDown: e => e.key==="Enter" && addCategory(),
            placeholder: "T.ex. Morgon, Städ, Mat…",
            style:{flex:1, border:".5px solid rgba(0,0,0,0.1)", borderRadius:12,
              padding:"10px 14px", fontSize:15, boxSizing:"border-box"}})
        , React.createElement("button", {onClick: addCategory,
            style:{background:"#6c5cc8", border:"none", borderRadius:12, padding:"10px 16px",
              color:"white", fontWeight:800, fontSize:14, cursor:"pointer", flexShrink:0}},
            "+ Skapa")

    /* Category list */
    , library.length === 0 && React.createElement("div", {style:{
        background:"white", borderRadius:14, padding:"32px 16px",
        border:".5px solid rgba(0,0,0,0.08)", textAlign:"center",
        color:"#8e8e93", fontSize:14}},
        "Inga kategorier än — skapa din första ovan")

    , library.map(cat =>
        React.createElement("div", {key:cat.id,
          style:{background:"white", borderRadius:14, padding:"12px 14px",
            marginBottom:8, border:".5px solid rgba(0,0,0,0.08)"}}
          , deleteId === cat.id
            ? React.createElement(DeleteConfirm, {label:cat.name,
                onConfirm:()=>deleteCategory(cat.id),
                onCancel:()=>setDeleteId(null)})
            : React.createElement("div", null
                , React.createElement("div", {style:{display:"flex", alignItems:"center", gap:12}}

/* StableEarnDialog — React.memo with stable identity. Only shown when showEarnDialog=true.
   closeEarnDialog resets both ref and boolean — no ghost modals possible. */
const StableEarnDialog = React.memo(function StableEarnDialog({
  earnChoiceRef, data, updateChild, timerStates, setTimerStates, setView, closeEarnDialog, showVictory, burst
}) {
  const ec = earnChoiceRef.current;
  if (!ec) return null;
  const childObj = (data.children||[]).find(c => c.id === ec.childId) || ec.childObj;
  if (!childObj) return null;

  const resetTimer = () => {
    setTimerStates(prev => ({...prev,
      [childObj.id]: {seconds:0, running:false,
        activity: (prev[childObj.id]||{}).activity || null, phase:"idle"}
    }));
    closeEarnDialog();
  };
  const checkGoHome = () => {
    const stillActive = Object.entries(timerStates).some(([id, ts]) =>
      id !== childObj.id && ts && (ts.phase==="running"||ts.phase==="paused")
    );
    if (!stillActive) setView("home");
  };

  return React.createElement(EarnChoiceDialog, {
    child: childObj,
    mins: ec.mins, pointRatio: ec.pointRatio,
    fixedPts: ec.fixedPts, rewardType: ec.rewardType || "time",
    onChooseTime: () => {
      const entry = {id:Date.now()+Math.random(),
        activity:ec.actId||"unknown", label:ec.actLabel||"Aktivitet",
        icon:ec.actIcon||"⭐", minutes:ec.mins,
        date:new Date().toLocaleDateString("sv-SE")};
      updateChild(childObj.id, {balance:(childObj.balance||0)+ec.mins, history:[entry,...(childObj.history||[])]});
      burst();
      resetTimer();
      showVictory({child:childObj, isReward:false, activityEmoji:ec.actIcon||"⏱️",
        activityTitle:(ec.actLabel||"Aktivitet")+" klar!", earnedMins:ec.mins, earnedPoints:0});
      checkGoHome();
    },
    onChoosePoints: (targetId) => {
      const pts = ec.fixedPts !== null && ec.fixedPts !== undefined
        ? ec.fixedPts : Math.round(ec.mins * (ec.pointRatio || 1));
      const targets = (childObj.targets||[]);
      let completedTarget = null;
      const updatedTargets = targets.map(t => {
        if (targetId && t.id !== targetId) return t;
        if (!targetId && (t.pointsCollected||0) >= t.cost) return t;
        const add = Math.min(pts, t.cost-(t.pointsCollected||0));
        const done = (t.pointsCollected||0)+add >= t.cost;
        if (done) completedTarget = {...t, pointsCollected:(t.pointsCollected||0)+add};
        return {...t, pointsCollected:(t.pointsCollected||0)+add};
      });
      const entry = {id:Date.now()+Math.random(),
        activity:ec.actId||"unknown", label:ec.actLabel||"Aktivitet",
        icon:ec.actIcon||"⭐", minutes:0, points:pts,
        date:new Date().toLocaleDateString("sv-SE")};
      updateChild(childObj.id, {points:(childObj.points||0)+pts, targets:updatedTargets, history:[entry,...(childObj.history||[])]});
      burst();
      resetTimer();
      showVictory({child:childObj, isReward:false, activityEmoji:ec.actIcon||"⭐",
        activityTitle:(ec.actLabel||"Aktivitet")+" klar!", earnedMins:0, earnedPoints:pts});
      if (completedTarget) setTimeout(()=>burst(), 400);
      checkGoHome();
    },
    onHome: () => { resetTimer(); setView("home"); },
    onRestart: () => { resetTimer(); }
  });
}, () => true); // never re-render from parent — dialog manages its own lifecycle

/* RotatePill — floats bottom-right in landscape, hints user to rotate back to portrait */
const RotatePill = React.memo(function RotatePill() {
  const [visible,   setVisible]   = React.useState(false);
  const [dismissed, setDismissed] = React.useState(false);

  React.useEffect(() => {
    const isLandscape = () => {
      // Use screen.orientation if available (Android, modern iOS)
      if (window.screen && window.screen.orientation && window.screen.orientation.type) {
        return window.screen.orientation.type.includes("landscape");
      }
      // Fallback: window.orientation (iOS legacy — 90 or -90 = landscape)
      if (typeof window.orientation !== "undefined") {
        return Math.abs(window.orientation) === 90;
      }
      // Desktop fallback
      return window.innerWidth > window.innerHeight;
    };

    const check = () => {
      const land = isLandscape();
      setVisible(land);
      if (!land) setDismissed(false);
    };

    // Small delay on mobile — iOS fires orientationchange before layout updates
    const checkDelayed = () => setTimeout(check, 150);

    check();
    window.addEventListener("resize", checkDelayed);
    window.addEventListener("orientationchange", checkDelayed);
    if (window.screen && window.screen.orientation) {
      window.screen.orientation.addEventListener("change", checkDelayed);
    }
    return () => {
      window.removeEventListener("resize", checkDelayed);
      window.removeEventListener("orientationchange", checkDelayed);
      if (window.screen && window.screen.orientation) {
        window.screen.orientation.removeEventListener("change", checkDelayed);
      }
    };
  }, []);

  if (!visible || dismissed) return null;

  return React.createElement("div", {
    style: {
      position: "fixed",
      bottom: "calc(20px + env(safe-area-inset-bottom))",
      right: "calc(16px + env(safe-area-inset-right))",

      boxShadow: "0 4px 16px rgba(0,0,0,0.25)",

    },
    onClick: () => setDismissed(true)
  }
    , React.createElement("span", {

function App() {

      const hasActiveTimer   = saved.timerStates && Object.values(saved.timerStates).some(t => t && t.phase !== "idle");

    if (trimmed[trimmed.length - 1] === v) {
      setViewRaw(v);
      return;
    }
    const next = [...trimmed, v];
    const nextIdx = next.length - 1;
    syncNavRefs(next, nextIdx);
    setNavHistory(next);
    setHistIdx(nextIdx);
    setViewRaw(v);

    const idx = histIdxRef.current;

      setHistIdx(newIdx);
      setViewRaw(hist[newIdx]);

            // Advance stepIdx to next unchecked step
            let nextIdx = s.stepIdx;
            for (let j = 0; j < steps.length; j++) {
              if (!newCompleted.includes(j)) { nextIdx = j; break; }
            }
            setRoutineSessions(ss => ({...ss,
              [child.id]: {...s, completed: newCompleted, stepIdx: nextIdx, secs: 0, running: false}
            }));
          },
          onSkipStep: (skipIdx) => {
            const s = routineSessions[child.id];
            if (!s) return;
            const steps = s.routine.steps || [];
            const targetIdx = (skipIdx !== undefined) ? skipIdx : s.stepIdx;
            // Mark targetIdx as skipped (add to completed so it counts, or just advance)
            // For skip: do NOT add to completed — skip means no reward for that step
            const newCompleted = s.completed.filter(i => i !== targetIdx);
            // Find next uncompleted step after targetIdx
            let nextIdx = targetIdx + 1;
            while (nextIdx < steps.length && newCompleted.includes(nextIdx)) nextIdx++;
            if (nextIdx >= steps.length) {
              // No more steps — finish with what's completed
              const c = (data.children||[]).find(x=>x.id===child.id);
              if (c) {
                const unique = [...new Set(newCompleted)];
                const earnedMins   = unique.reduce((a,i)=>{ const m=steps[i].mode||"timer"; return a+((m==="timer"||m==="tid")?(steps[i].minutes||0):0); },0);
                const earnedPoints = unique.reduce((a,i)=>{ const m=steps[i].mode||"timer"; return a+(m==="points"?(steps[i].points||0):0); },0);
                const historyEntries = unique.map(i=>({
                  id:Date.now()+i+Math.random(), activity:steps[i].actId||steps[i].label,
                  label:steps[i].label, icon:steps[i].icon||"⚡",
                  minutes:(()=>{ const m=steps[i].mode||"timer"; return (m==="timer"||m==="tid") ? (steps[i].minutes||0) : 0; })(),
                  points: (()=>{ const m=steps[i].mode||"timer"; return m==="points" ? (steps[i].points||0) : 0; })(),
                  mode: steps[i].mode||"timer", fromRoutine:true, routineName:s.routine.name||"Rutin",
                  date:new Date().toLocaleDateString("sv-SE")
                }));
                updateChild(child.id, {
                  balance:(c.balance||0)+earnedMins,
                  points:(c.points||0)+earnedPoints,
                  history:[...historyEntries,...(c.history||[])]
                });
              }
              setRoutineSessions(ss => ({...ss, [child.id]: {...s, completed:newCompleted, done:true, running:false}}));
            } else {
              setRoutineSessions(ss => ({...ss,
                [child.id]: {...s, completed:newCompleted, stepIdx:nextIdx, secs:0, running:false}}));
            }
          },
          onEarlyFinish: () => {
            const s = routineSessions[child.id];
            if (!s) return;
            const steps = s.routine.steps || [];
            const c = (data.children||[]).find(x=>x.id===child.id);
            if (c) {
              const unique = [...new Set(s.completed)];
              const earnedMins   = unique.reduce((a,i)=>{ const m=steps[i].mode||"timer"; return a+((m==="timer"||m==="tid")?(steps[i].minutes||0):0); },0);
              const earnedPoints = unique.reduce((a,i)=>{ const m=steps[i].mode||"timer"; return a+(m==="points"?(steps[i].points||0):0); },0);
              const historyEntries = unique.map(i=>({
                id:Date.now()+i+Math.random(), activity:steps[i].actId||steps[i].label,
                label:steps[i].label, icon:steps[i].icon||"⚡",
                minutes:(()=>{ const m=steps[i].mode||"timer"; return (m==="timer"||m==="tid") ? (steps[i].minutes||0) : 0; })(),
                points: (()=>{ const m=steps[i].mode||"timer"; return m==="points" ? (steps[i].points||0) : 0; })(),
                mode:steps[i].mode||"timer", fromRoutine:true, routineName:s.routine.name||"Rutin",
                date:new Date().toLocaleDateString("sv-SE")
              }));
              updateChild(child.id, {
                balance:(c.balance||0)+earnedMins,
                points:(c.points||0)+earnedPoints,
                history:[...historyEntries,...(c.history||[])]
              });
              showToast("🏁 Rutin avslutad — " + earnedMins + " min intjänade!");
            }
            setRoutineSessions(ss => ({...ss, [child.id]: {...s, completed:s.completed, done:true, running:false}}));
          },
          onDone: () => { setRoutineFromSplit(false); setRoutineSessions(s => { const n={...s}; delete n[child.id]; return n; }); setView("home"); },
          onBack: () => { setRoutineFromSplit(false); setView("home"); },
          onAbort: () => {
            setRoutineFromSplit(false);
            setRoutineSessions(s => { const n={...s}; delete n[child && child.id]; return n; });
            setView("home");
          },
          onReturnToSplit: (() => {
            const othersActive = Object.keys(routineSessions).filter(id =>
              id !== (child && child.id) &&
              routineSessions[id] &&
              !routineSessions[id].done
            );
            if (othersActive.length === 0) return null;
            return () => {
              const nextChildId = othersActive[0];
              setActiveChild(nextChildId);
              setRoutineSessions(s => { const n={...s}; delete n[child.id]; return n; });
              setView("routine");
            };
          })(),
          hasOtherActiveSessions: routineFromSplit && Object.keys(routineSessions).some(id =>
            id !== (child && child.id) &&
            routineSessions[id] &&
            !routineSessions[id].done
          )
        })
      )
      , effectiveView === "routine-split" && (
        React.createElement(RoutineSplitView, {
          kids: allRoutineKids,
          routineSessions: routineSessions,
          setRoutineSessions: setRoutineSessions,
          updateChild: updateChild,
          data: data,
          setView: setView,
          setActiveChild: setActiveChild,
          setRoutineFromSplit: setRoutineFromSplit,
          onBack: () => setView("home")
        })
      )
      , effectiveView === "settings" && (
        adminUnlocked
          ? React.createElement(SettingsView, { data: data, setData: setData, showToast: showToast,
              timerStates: timerStates, setTimerStates: setTimerStates,
              onLock: ()=>{ setAdminUnlocked(false); setView("home"); }})
          : React.createElement(AdminPinGate, { data: data, showToast: showToast,
              onUnlock: ()=>setAdminUnlocked(true)})
      )

      , backConfirm && (
        React.createElement(BackConfirmDialog, {
          onStay: () => { setBackConfirm(false); setBackConfirmMode("default"); },
          onKeepAndLeave: keepAndGoHome,
          onSaveAndLeave: saveTimersAndGoHome,
          onDiscardAndLeave: discardTimersAndGoHome,
          onDiscardOne: discardOneTimerAndGoHome,
          mode: backConfirmMode,
          setMode: setBackConfirmMode,
          splitKids: effectiveView === "split-timer" ? splitKids : [],
          data: data})
      )

      , React.createElement(Toast, { msg: toastMsg})

      , victoryCard && React.createElement(VictoryCard, {
          child:          victoryCard.child,
          activityEmoji:  victoryCard.activityEmoji,
          activityTitle:  victoryCard.activityTitle,
          earnedMins:     victoryCard.earnedMins,
          earnedPoints:   victoryCard.earnedPoints,
          isReward:       victoryCard.isReward,
          rewardLabel:    victoryCard.rewardLabel,
          manual:         victoryCard.manual || false,
          onDismiss: () => setVictoryCard(null)
        })

      /* ── Stable EarnChoiceDialog — controlled by showEarnDialog, never triggered by timer ticks ── */
      , showEarnDialog && React.createElement(StableEarnDialog, {
          earnChoiceRef: earnChoiceRef,
          data: data,
          updateChild: updateChild,
          timerStates: timerStates,
          setTimerStates: setTimerStates,
          setView: setView,
          closeEarnDialog: closeEarnDialog,
          showVictory: showVictory,
          burst: burst
        })

      /* ── Bottom navigation bar ── */
      , React.createElement(BottomNav, {
          canGoBack:    histIdx > 0,
          canGoForward: histIdx < navHistory.length - 1,
          onBack:    goBack,
          onForward: goForward,
          onHome:    goHome,
          onAdmin:   () => { setAdminUnlocked(false); navigateTo("settings"); },
          currentView: effectiveView,
          timerRunning: Object.values(timerStates).some(ts => ts && ts.phase === "running")
        })

      /* ── Rotate pill — shown in landscape to hint portrait is better ── */
      , React.createElement(RotatePill)
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App, {__self: this}));

</script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        // Only register SW on production (GitHub Pages), not in preview environments
        const isProduction = location.hostname !== 'localhost' &&
                             !location.hostname.includes('claude') &&
                             !location.hostname.includes('anthropic');
        if (isProduction) {
          navigator.serviceWorker.register('./sw.js')
            .catch(err => console.warn('SW registration failed:', err));
        }
      });
    }
  </script>
</body>
