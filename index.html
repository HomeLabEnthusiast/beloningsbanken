/* ═══════════════ LIVING AVATAR ═════════════════════════════════════════════ */
// Derives an "aura" from today's activity history
function getLivingAvatar(child) {
  const today = new Date().toLocaleDateString("sv-SE");
  const todayHistory = (child.history||[]).filter(h => h.date === today);
  const acts = todayHistory.map(h => h.activity);
  const totalToday = todayHistory.reduce((s,h) => s+(h.minutes||0), 0);

  // Pick dominant badge based on what they did today
  if (acts.includes("reading")  && todayHistory.find(h=>h.activity==="reading" && h.minutes>=15))
    return { badge:"📖", glow:"#0d9488", label:"Läshjälten!", shimmer:false };
  if (acts.includes("cleaning") && todayHistory.find(h=>h.activity==="cleaning"))
    return { badge:"✨", glow:"#f59e0b", label:"Städstjärnan!", shimmer:true };
  if (acts.includes("exercise") && todayHistory.find(h=>h.activity==="exercise"))
    return { badge:"💪", glow:"#8b5cf6", label:"Sporthjälten!", shimmer:false };
  if (totalToday >= 30)
    return { badge:"🔥", glow:"#ef4444", label:"På fire idag!", shimmer:false };
  if (totalToday > 0)
    return { badge:"⭐", glow:"#fbbf24", label:"Bra start!", shimmer:false };
  return null;
}

function getDailyMissions(activities) {
  const acts = activities && activities.length ? activities : DEFAULT_ACTIVITIES;
  const seed = new Date().getDate() + new Date().getMonth() * 31;
  const minOptions  = [5, 10, 15, 20, 30];
  const bonusLabels = ["Dubbla poäng! x2", "+50% extrapoäng!", "Bonustid!", "Stjärnbonus!", "Superdags!"];
  return acts.map((act, idx) => {
    const s    = seed + idx * 7;
    const mins = minOptions[s % minOptions.length];
    const bonus = bonusLabels[s % bonusLabels.length];
    return { act, mins, bonus };
  });
}

/* The in-card reward countdown widget */
function ActiveRewardWidget({ reward, onPause, onCancel, onDone }) {
  const totalSec = (reward.durationMin || reward.cost) * 60;

  // LOCAL state for paused — avoids prop feedback loop causing flicker
  const [isPaused, setIsPaused] = useState(reward.paused || false);

  // Calculate true elapsed using wall-clock time so background ticking works
  const calcElapsed = () => {
    if (reward.paused || !reward.startedAt) return reward.elapsed || 0;
    const wallElapsed = Math.floor((Date.now() - reward.startedAt) / 1000);
    return Math.min(totalSec, (reward.elapsed || 0) + wallElapsed);
  };

  const [secs, setSecs]  = useState(calcElapsed);
  const intervalRef      = useRef(null);
  const secsRef          = useRef(secs);
  const isPausedRef      = useRef(isPaused);
  const cancelledRef     = useRef(false);
  const doneCalledRef    = useRef(false);  // guard: onDone fires exactly once

  // Safe wrapper — guarantees onDone is called at most once
  const fireDone = () => {
    if (doneCalledRef.current) return;
    doneCalledRef.current = true;
    clearInterval(intervalRef.current);
    onDone();
  };

  useEffect(() => { secsRef.current   = secs;     }, [secs]);
  useEffect(() => { isPausedRef.current = isPaused; }, [isPaused]);

  // Start/stop interval based on isPaused
  useEffect(() => {
    clearInterval(intervalRef.current);
    if (!isPaused) {
      intervalRef.current = setInterval(() => {
        // Read secs from ref to avoid stale closure
        const next = secsRef.current + 1;
        if (next >= totalSec) {
          setSecs(totalSec);
          fireDone();
        } else {
          setSecs(next);
        }
      }, 1000);
    }
    return () => clearInterval(intervalRef.current);
  }, [isPaused]);

  // On first mount: correct time from wall clock
  useEffect(() => {
    const corrected = calcElapsed();
    if (corrected >= totalSec) { fireDone(); return; }
    setSecs(corrected);
  }, []);

  // Sync to localStorage every 5 seconds
  useEffect(() => {
    const syncRef = setInterval(() => onPause(secsRef.current, isPausedRef.current), 5000);
    return () => {
      clearInterval(syncRef);
      // Save on unmount only if not cancelled AND reward not already done
      if (!cancelledRef.current && !doneCalledRef.current) onPause(secsRef.current, isPausedRef.current);
    };
  }, []);

  // Toggle pause/resume — local state only, then sync
  const handleTogglePause = () => {
    const next = !isPaused;
    setIsPaused(next);
    onPause(secsRef.current, next);
  };

  const remaining = Math.max(0, totalSec - secs);
  const pct       = totalSec > 0 ? secs / totalSec : 0;
  const mm = String(Math.floor(remaining / 60)).padStart(2,"0");
  const ss = String(remaining % 60).padStart(2,"0");

  /* ── Graceful Exit phases (80% / 20% of total time remaining) ── */
  const warn80 = totalSec >= 30 && remaining <= totalSec * 0.7 && remaining > totalSec * 0.2;
  const crit20 = remaining <= totalSec * 0.2 && remaining > 0;
  const phase  = crit20 ? "crit" : warn80 ? "warn" : "normal";

  const warn5=warn80, crit1=crit20; // aliases
  const P = {
    normal: { bg:"linear-gradient(135deg,#fff7ed,#fef3c7)", border:"#fed7aa",
              timerColor:"#f97316", barBg:"linear-gradient(90deg,#f97316,#fbbf24)",
              cardAnim:"none", labelColor:"#92400e", statusColor:"#a16207",
              status: isPaused ? "⏸ Pausad" : "⏱ Pågår…" },
    warn:   { bg:"linear-gradient(135deg,#fffbeb,#fef9c3)", border:"#fbbf24",
              timerColor:"#d97706", barBg:"linear-gradient(90deg,#f59e0b,#fbbf24)",
              cardAnim: isPaused ? "none" : "warning-pulse 2.2s ease-in-out infinite",
              labelColor:"#92400e", statusColor:"#b45309",
              status:"⚠️ Snart dags att avsluta!" },
    crit:   { bg:"linear-gradient(135deg,#fff1f2,#fee2e2)", border:"#fca5a5",
              timerColor:"#ef4444", barBg:"linear-gradient(90deg,#ef4444,#f87171)",
              cardAnim: isPaused ? "none" : "graceful-pulse 1.3s ease-in-out infinite",
              labelColor:"#991b1b", statusColor:"#b91c1c",
              status:"🔴 Dags att avsluta!" },
  }[phase];

  return (
    React.createElement('div', { className: "bounce-in", style: {
      background: P.timerColor + "08",
      border: ".5px solid rgba(0,0,0,0.07)",
      borderLeft: "3px solid " + P.timerColor,
      borderRadius: "0 10px 10px 0",
      padding: "10px 12px", marginTop: 0,
      animation: P.cardAnim,
      transition: "border-color 1.2s ease"
    }}

      /* ── Warning / critical banner ── */
      , (warn80 || crit20) && !isPaused && (
        React.createElement('div', { style: {
          background: crit1 ? "#fff1f2" : "#fef3e0",
          borderLeft: crit1 ? "3px solid #b91c1c" : "3px solid #c47a00",
          border: crit1 ? ".5px solid #fecdd3" : ".5px solid #f8dca0",
          borderRadius: "0 8px 8px 0",
          padding: "7px 10px", marginBottom: 8,
          display: "flex", alignItems: "center", gap: 8,
          animation: crit1 ? "countdown-flash 1s ease-in-out infinite" : "none"
        }}
          , React.createElement('span', {style:{fontSize:14}}, crit1 ? "🔴" : "⚠️")
          , React.createElement('span', {style:{
              fontSize:12, fontWeight:600, color: crit1 ? "#b91c1c" : "#8a6000",
              flex:1, lineHeight:1.3, letterSpacing:"-.01em"}},
              crit1 ? "Dags att avsluta!" : "Snart dags att avsluta!"
            )
          , React.createElement('span', {style:{

      /* ── Row 1: name + icon tight together ── */
      , React.createElement('div', { style: {display:"flex", alignItems:"center", gap:6, marginBottom:8}}
        , React.createElement('div', { style: {

        , React.createElement('span', { style: {fontSize:22, lineHeight:1, flexShrink:0}},

        , React.createElement('span', null, Math.round(pct*100), "% klar")
        , React.createElement('span', null, reward.durationMin || reward.cost, " min totalt")
      )
    )
  );
}

function FamilyTargetSection({familyTarget, setFamilyTarget, child, updateChild, showToast, allChildren}) {
  const [showAllocate, setShowAllocate] = React.useState(false);
  const [allocAmt, setAllocAmt] = React.useState("");
  const [showCelebration, setShowCelebration] = React.useState(false);
  const [showEdit, setShowEdit] = React.useState(false);
  const [showDeleteConfirm, setShowDeleteConfirm] = React.useState(false);
  const [editName, setEditName] = React.useState("");
  const [editCost, setEditCost] = React.useState("");
  const [editImage, setEditImage] = React.useState(null);
  const editImgRef = React.useRef(null);

  if (!familyTarget) return null;

  const totalCollected = (allChildren||[]).reduce((s,k) => s+(k.familyPoints||0), 0);
  const pct   = familyTarget.cost > 0 ? Math.min(1, totalCollected/familyTarget.cost) : 0;
  const done  = totalCollected >= familyTarget.cost;
  const bank  = child.points || 0;
  const space = Math.max(0, familyTarget.cost - totalCollected);
  const myPts = child.familyPoints || 0;

  const openEdit = () => {
    setEditName(familyTarget.name);
    setEditCost(String(familyTarget.cost));
    setEditImage(familyTarget.image || null);
    setShowEdit(true);
    setShowAllocate(false);
  };

  const saveEdit = () => {
    const cost = parseInt(editCost);
    if (!editName.trim() || !cost || cost < 1) return;
    if (setFamilyTarget) setFamilyTarget({...familyTarget, name:editName.trim(), cost, image:editImage});
    setShowEdit(false);
    showToast("Familjemål uppdaterat!");
  };

  const confirmAllocate = () => {
    const amt = parseInt(allocAmt);
    if (!amt || amt <= 0) return;
    const actual = Math.min(amt, bank, space);
    if (actual <= 0) { showToast("Inte tillräckligt med poäng!"); return; }
    updateChild(child.id, { points: bank - actual, familyPoints: myPts + actual });
    if ((totalCollected + actual) >= familyTarget.cost) setTimeout(() => setShowCelebration(true), 400);

  const activeTargets = (child.targets || []).filter(t => (t.pointsCollected||0) < t.cost);
  const currentPoints = child.points || 0;

  const [selectedTarget, setSelectedTarget] = React.useState(null);
  const [nudge, setNudge] = React.useState(false);

  React.useEffect(() => {
    if (step !== "choose") return;
    const t = setTimeout(() => setNudge(true), 3000);
    return () => clearTimeout(t);
  }, [step]);
  // Stop nudge as soon as user interacts
  const stopNudge = () => setNudge(false);

  const showTime   = !rewardType || rewardType === "time" || rewardType === "fixed";
  const showPoints = !rewardType || rewardType === "time" || rewardType === "fixedPoints";

  const confirmTarget = () => {
    onChoosePoints(selectedTarget ? selectedTarget.id : null);

/* ═══════════════ HOLD TO STOP ══════════════════════════════════════════════ */
function HoldToStop({ onStop, color, compact, pillBar }) {
  const [progress, setProgress] = React.useState(0);
  const intervalRef = React.useRef(null);
  const firedRef = React.useRef(false);
  const HOLD_MS = 1800, TICK = 30;
  const startHold = () => {
    if (intervalRef.current) return;
    firedRef.current = false;
    intervalRef.current = setInterval(() => {
      setProgress(p => {
        const next = p + (TICK / HOLD_MS) * 100;
        if (next >= 100) {
          clearInterval(intervalRef.current); intervalRef.current = null;
          if (!firedRef.current) { firedRef.current = true; onStop(); }
          return 0;
        }
        return next;
      });
    }, TICK);
  };
  const cancelHold = () => { clearInterval(intervalRef.current); intervalRef.current = null; setProgress(0); };
  React.useEffect(() => { return () => { clearInterval(intervalRef.current); }; }, []);
  const size = 64, radius = 28;
  const circ = 2 * Math.PI * radius;
  const offset = circ * (1 - progress / 100);
  if (pillBar) return (
    React.createElement('button', {
      className: "hold-stop",
      onContextMenu: e => e.preventDefault(),
      onMouseDown: startHold, onMouseUp: cancelHold, onMouseLeave: cancelHold,
      onTouchStart: e => { e.preventDefault(); startHold(); },
      onTouchEnd: cancelHold, onTouchCancel: cancelHold,
      style: {
        background: "none", border: "none",
        width: "100%", padding: "10px 0",
        fontSize: 12, fontWeight: 500,
        color: "#b91c1c", cursor: "pointer",
        display: "flex", alignItems: "center", justifyContent: "center", gap: 5,
        position: "relative", overflow: "hidden"}},
      progress > 0 && React.createElement('div', {style:{
        position:"absolute", left:0, top:0, height:"100%",
        width: progress+"%", background:"rgba(185,28,28,0.08)",
        transition:"width 0.03s linear"}}),
      React.createElement('span', {style:{fontSize:13}}, "⏹"),
      " Håll för stopp"
    )
  );
  return React.createElement('div', {style:{display:"flex",flexDirection:"column",alignItems:"center",gap:5}}
    , React.createElement('div', {style:{position:"relative",width:size,height:size}}
      , React.createElement('svg', {width:size,height:size,style:{position:"absolute",top:0,left:0,transform:"rotate(-90deg)"}}
        , React.createElement('circle', {cx:size/2,cy:size/2,r:radius,fill:"none",stroke:"#e2e8f0",strokeWidth:4})
        , React.createElement('circle', {cx:size/2,cy:size/2,r:radius,fill:"none",stroke:color||"#ef4444",strokeWidth:4,
            strokeDasharray:circ,strokeDashoffset:offset,strokeLinecap:"round",
            style:{transition:"stroke-dashoffset 0.03s linear"}})
      )
      , React.createElement('button', {
          className: "hold-stop",
          onContextMenu: e => e.preventDefault(),
          onMouseDown:startHold, onMouseUp:cancelHold, onMouseLeave:cancelHold,
          onTouchStart:e=>{e.preventDefault();startHold();}, onTouchEnd:cancelHold, onTouchCancel:cancelHold,
          style:{position:"absolute",inset:4,
            background:progress>0?"linear-gradient(135deg,#ef4444,#dc2626)":"#f8fafc",
            border:"none",borderRadius:"50%",cursor:"pointer",
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,
            transition:"background 0.15s",
            boxShadow:progress>0?"0 4px 14px rgba(239,68,68,0.4)":"none"}},
          "⏹"
        )
    )
    , React.createElement('span', {style:{fontSize:10,fontWeight:800,color:"#8e8e93",textAlign:"center"}},
        progress>0 ? "Släpp för att avbryta…" : "Håll inne för stopp"
      )
  );
}

/* ═══════════════ TIMER PANEL ═══════════════════════════════════════════════ */
function TimerPanel({child, updateChild, showToast, activities, activityCategories, timerState, setTimerState, compact, onDone, layoutB}) {
  const acts  = activities || DEFAULT_ACTIVITIES;
  const secs  = timerState.seconds  !== undefined ? timerState.seconds  : 0;
  const run   = timerState.running  !== undefined ? timerState.running  : false;
  const act   = timerState.activity !== undefined ? timerState.activity : acts[0];
  const phase = timerState.phase    !== undefined ? timerState.phase    : "idle";
  // Ticking is handled globally in App — no local interval needed

  const [earnChoice, setEarnChoice] = useState(null);

  const [celebrationGoal, setCelebrationGoal] = useState(null);

  const doStop = () => {
    if (secs < 5) { showToast("⚡ För kort! Fortsätt lite till!"); return; }
    if (phase === "done") return; // already stopped — ignore repeat touch events
    setTimerState(p => ({...p, running: false, phase: "done"}));
    const rawMins = Math.ceil(secs / 60);
    const mins = (act && act.rewardType === "fixed" && act.fixedMinutes) ? act.fixedMinutes : rawMins;
    const ratio = (act && act.pointRatio) ? act.pointRatio : 1;
    const fixedPts = (act && act.rewardType === "fixedPoints") ? (act.fixedPoints||10) : null;
    setEarnChoice({mins, pointRatio: ratio, isFixed: !!(act && act.rewardType === "fixed"), fixedPts, rewardType: (act && act.rewardType) || "time", actId: act && act.id, actLabel: act && act.label, actIcon: act && act.icon});
  };

  const handleChooseTime = () => {
    const {mins} = earnChoice;
    const entry = {id:Date.now()+Math.random(), activity:act.id, label:act.label,
      icon:act.icon, minutes:mins, date:new Date().toLocaleDateString("sv-SE")};
    updateChild(child.id, {balance:child.balance+mins, history:[entry,...(child.history||[])]});
    burst();
    setEarnChoice(null);
    doReset();
    if (window._showVictory) {
      const act = acts.find(a => a.id === earnChoice.actId) || {};
      window._showVictory({
        child, isReward: false,
        activityEmoji: act.icon || "⏱️",
        activityTitle: (act.label || "Aktivitet") + " klar!",
        earnedMins: mins, earnedPoints: 0
      });
    } else {
      showToast("🕐 +" + mins + " min skärmtid till " + child.name + "!");
    }
    if (window.sendNotification) {
      const act = acts.find(a => a.id === earnChoice.actId) || {};
      window.sendNotification(
        child.name + " — Aktivitet klar! ⏱️",
        (act.label || "Aktivitet") + " avslutad. +" + mins + " min skärmtid intjänad.",
        ""
      );
    }
    if (onDone) onDone(child.id);
  };

  const handleChoosePoints = (targetId) => {
    const {mins, pointRatio, fixedPts} = earnChoice;
    const pts = fixedPts !== null && fixedPts !== undefined ? fixedPts : Math.round(mins * (pointRatio || 1));
    const targets = (child.targets || []);
    let completedTarget = null;
    const updatedTargets = targets.map(t => {
      if (targetId && t.id !== targetId) return t;
      if (!targetId && (t.pointsCollected||0) >= t.cost) return t;
      const add = Math.min(pts, t.cost - (t.pointsCollected||0));
      const done = (t.pointsCollected||0) + add >= t.cost;
      if (done) completedTarget = {...t, pointsCollected: (t.pointsCollected||0)+add};

/* ── Per-child time adjuster (isolated state) ── */
function ChildTimeAdjuster({child, onAdjust, label, color}) {
  const lbl   = label || "⏱ MIN";
  const clr   = color || "#0d9488";
  const [showCustom, setShowCustom] = React.useState(false);
  const [val, setVal] = React.useState("");

  const applyCustom = (sign) => {
    const v = Math.abs(parseInt(val));
    if (isNaN(v) || v === 0) return;
    onAdjust(child.id, sign * v);
    setVal(""); setShowCustom(false);
  };

  return React.createElement('div', {style:{marginBottom:14}}

    /* Compact row: label + quick buttons + custom toggle */
    , React.createElement('div', {style:{display:"flex",alignItems:"center",gap:4,flexWrap:"nowrap"}}
      , React.createElement('span', {style:{fontSize:10,fontWeight:800,color:clr,
          letterSpacing:1,marginRight:2,whiteSpace:"nowrap"}}, lbl)
      , [-15,-5,5,15].map(v=>
          React.createElement('button', {key:v, className:"btn-big",
            onClick:()=>onAdjust(child.id,v),
            style:{padding:"4px 7px",borderRadius:8,border:"none",cursor:"pointer",
              fontWeight:800,fontSize:12,flexShrink:0,
              background:v>0?"#d1fae5":"#fee2e2",
              color:v>0?"#059669":"#ef4444"}},
            v>0?"+":"", v
          )
        )
      , React.createElement('button', {className:"btn-big",
          onClick:()=>setShowCustom(s=>!s),
          style:{padding:"4px 7px",borderRadius:8,border:"1.5px solid #e2e8f0",
            background: showCustom?"#f1f5f9":"white",flexShrink:0,
            cursor:"pointer",fontWeight:700,fontSize:12,color:"#6d6d72"}},
          showCustom ? "✕" : "✏️"
        )
    )

    /* Custom input — inline, only when open */
    , showCustom && React.createElement('div', {className:"bounce-in",
        style:{display:"flex",gap:7,alignItems:"center",marginTop:8}}
      , React.createElement('input', {value:val,
          onChange:e=>setVal(e.target.value),
          onKeyDown:e=>e.key==="Enter"&&applyCustom(1),
          placeholder: lbl==="⭐ POÄNG" ? "Antal poäng…" : "Antal min…", type:"number", min:"0",
          style:{width:110,border:"2px solid #e2e8f0",borderRadius:9,
            padding:"7px 10px",fontSize:13,boxSizing:"border-box"}})
      , React.createElement('button', {className:"btn-big", onClick:()=>applyCustom(1),
          style:{background:clr,border:"none",borderRadius:9,padding:"7px 12px",
            color:"white",fontWeight:800,fontSize:13,cursor:"pointer"}}, "+")
      , React.createElement('button', {className:"btn-big", onClick:()=>applyCustom(-1),
          style:{background:"#ef4444",border:"none",borderRadius:9,padding:"7px 12px",
            color:"white",fontWeight:800,fontSize:13,cursor:"pointer"}}, "−")
    )
  );
}

  const todayRewardMins  = hist.filter(h => h.isReward).reduce((s,h) => s+(h.minutes||0), 0)

function RoutineSplitView({kids, routineSessions, setRoutineSessions, updateChild, data, setView, setActiveChild, setRoutineFromSplit, onBack}) {

  const fmt = (s) => {
    const m = Math.floor(s / 60);
    const sec = s % 60;

  };

  /* ── Responsive layout ── */
  const [winSize, setWinSize] = React.useState({w: window.innerWidth, h: window.innerHeight});
  React.useEffect(() => {
    const onResize = () => setWinSize({w: window.innerWidth, h: window.innerHeight});
    window.addEventListener("resize", onResize);
    window.addEventListener("orientationchange", () => setTimeout(onResize, 100));
    return () => { window.removeEventListener("resize", onResize); };
  }, []);
  const isPortrait  = winSize.w < 640;
  const isCompact   = winSize.w < 900;
  const isLandscape = winSize.w >= 640 && winSize.h < 500;
  const cardPad     = isPortrait ? "10px 8px"  : "14px";
  const cardFlex    = isPortrait ? "1 1 auto"  : "1 1 0";
  const cardMinW    = isPortrait ? "100%"      : "0";
  const innerDir    = isPortrait ? "column"    : "row";
  const stepColW    = isPortrait ? "100%"      : isLandscape ? "42%" : "38%";
  const headerFs    = isPortrait ? 14          : 15;
  const bubbleSize  = isPortrait ? 36          : 44;
  const timerFs     = isPortrait ? 24          : 30;
  const stepFs      = isPortrait ? 13          : isCompact ? 13 : 14;
  const stepPad     = isPortrait ? "6px 8px"   : "7px 8px";
  const stepGap     = isPortrait ? 5            : 6;
  const listMaxH    = isPortrait ? "none"       : isLandscape ? "260px" : "none";

  const handleToggle = (childId) => {
    setRoutineSessions(s => ({...s,
      [childId]: {...s[childId], running: !s[childId].running}
    }));
  };

  /* Advance current child's step: mark as completed, go to next (or finish) */
  const handleComplete = (childId) => {
    const s = routineSessions[childId];
    if (!s) return;
    const steps = s.routine.steps || [];
    // Deduplicate: only add stepIdx if not already in completed
    const newCompleted = s.completed.includes(s.stepIdx) ? [...s.completed] : [...s.completed, s.stepIdx];

    if (s.stepIdx + 1 >= steps.length) {
      /* All steps done */
      const uniqueNew = [...new Set(newCompleted)];
      const c = (data.children||[]).find(x => x.id === childId);
      if (c) {
        const earnedMins   = uniqueNew.reduce((a,i) => { const m=steps[i].mode||"timer"; return a+((m==="timer"||m==="tid")?(steps[i].minutes||0):0); }, 0);
        const earnedPoints = uniqueNew.reduce((a,i) => { const m=steps[i].mode||"timer"; return a+(m==="points"?(steps[i].points||0):0); }, 0);
        const bonus     = uniqueNew.length === steps.length ? (s.routine.bonus||0)    : 0;
        const bonusMins = uniqueNew.length === steps.length ? (s.routine.bonusMins||0) : 0;
        const historyEntries = uniqueNew.map(i => ({
          id: Date.now()+i+Math.random(), activity: steps[i].actId||steps[i].label,
          label: steps[i].label, icon: steps[i].icon||"⚡",
          minutes: (()=>{ const m=steps[i].mode||"timer"; return (m==="timer"||m==="tid") ? (steps[i].minutes||0) : 0; })(),
          points:  (()=>{ const m=steps[i].mode||"timer"; return m==="points" ? (steps[i].points||0) : 0; })(),
          mode: steps[i].mode||"timer",
          fromRoutine: true, routineName: s.routine.name||"Rutin",
          date: new Date().toLocaleDateString("sv-SE")
        }));
        updateChild(childId, {
          balance: (c.balance||0)+earnedMins+bonusMins,
          points:  (c.points||0)+earnedPoints+bonus,
          history: [...historyEntries, ...(c.history||[])]
        });
      }
      setRoutineSessions(ss => ({...ss, [childId]: {...s, completed: uniqueNew, done:true, running:false}}));
    } else {
      setRoutineSessions(ss => ({...ss,
        [childId]: {...s, completed: newCompleted, stepIdx: s.stepIdx+1, secs:0, running:false}
      }));
    }
  };

  const handleUncheck = (childId, stepI) => {
    setRoutineSessions(ss => {
      const s = ss[childId];
      if (!s) return ss;
      const newCompleted = s.completed.filter(c => c !== stepI);
      const newIdx = stepI <= s.stepIdx ? stepI : s.stepIdx;
      return {...ss, [childId]: {...s, completed: newCompleted, stepIdx: newIdx, secs: 0, running: false}};
    });
  };

  const handleCheck = (childId, stepI) => {
    setRoutineSessions(ss => {
      const s = ss[childId];
      if (!s) return ss;
      const steps = s.routine.steps || [];
      const newCompleted = s.completed.includes(stepI) ? s.completed : [...s.completed, stepI];

      if (allNowDone) {
        return {...ss, [childId]: {...s, completed: newCompleted, stepIdx: steps.length - 1, secs: 0, running: false}};
      }
      // Advance to next unchecked step
      let nextIdx = s.stepIdx;
      for (let j = 0; j < steps.length; j++) {
        if (!newCompleted.includes(j)) { nextIdx = j; break; }

/* ========= TEMPLATES ADMIN ============================================== */
function TemplatesAdmin({data, setData, showToast, getCats}) {
  const templates = data.templates || [];
  const [showForm,    setShowForm]    = React.useState(false);
  const [editId,      setEditId]      = React.useState(null);
  const [tName,       setTName]       = React.useState("");
  const [tEmoji,      setTEmoji]      = React.useState("⚡");
  const [tBonus,      setTBonus]      = React.useState("");
  const [tBonusMins,  setTBonusMins]  = React.useState("");
  const [tSteps,      setTSteps]      = React.useState([]); // [{actId, label, icon, minutes, points}]
  const [deleteId,    setDeleteId]    = React.useState(null);
  const [pickerCat,   setPickerCat]   = React.useState(null);  // null=grid, catId=show acts
  const [pickerSel,   setPickerSel]   = React.useState({});    // {actId: act}

  // Flatten all activities from categories
  const allActs = React.useMemo(() => {
    const cats = getCats();
    return cats.flatMap(cat => (cat.activities||[]).map(a => ({...a, catLabel: cat.label})));
  }, [data.activityCategories]);

  const openNew = () => {
    setEditId(null); setTName(""); setTEmoji("⚡"); setTBonus(""); setTBonusMins(""); setTSteps([]);
    setPickerCat(null); setPickerSel({});
    setShowForm(true);
  };

  const openEdit = (t) => {
    setEditId(t.id); setTName(t.name); setTEmoji(t.emoji||"⚡");
    setTBonus(t.bonus ? String(t.bonus) : ""); setTBonusMins(t.bonusMins ? String(t.bonusMins) : ""); setTSteps(t.steps||[]);
    setShowForm(true);
    setPickerCat(null); setPickerSel({});
  };

  const addStep = (act) => {
    setTSteps(s => [...s, {
      actId: act.id, label: act.label, icon: act.icon||"⚡",
      mode: "timer",
      minutes: act.fixedMinutes || 5,
      points: 0
    }]);
  };

  const removeStep = (i) => setTSteps(s => s.filter((_,idx) => idx !== i));

  const updateStep = (i, field, val) => {
    setTSteps(s => s.map((step, idx) => {
      if (idx !== i) return step;
      const updated = {...step, [field]: val};
      // When mode changes, zero out fields irrelevant to the new mode
      if (field === "mode") {
        if (val === "checklist")              { updated.minutes = 0; updated.points = 0; }
        else if (val === "points")            { updated.minutes = 0; }
        else if (val === "timer" || val === "tid") { updated.points = 0; }
      }
      return updated;
    }));
  };

  const moveStep = (i, dir) => {
    setTSteps(s => {
      const arr = [...s];
      const j = i + dir;
      if (j < 0 || j >= arr.length) return arr;
      [arr[i], arr[j]] = [arr[j], arr[i]];
      return arr;
    });
  };

  const saveTemplate = () => {
    if (!tName.trim()) { showToast("Ange ett namn!"); return; }
    if (tSteps.length === 0) { showToast("Lägg till minst en aktivitet!"); return; }
    // Sanitize steps: ensure checklist/points steps don't carry stale minutes/points
    const sanitizedSteps = tSteps.map(step => {
      const m = step.mode || "timer";
      if (m === "checklist") return {...step, minutes: 0, points: 0};
      if (m === "points")    return {...step, minutes: 0};
      if (m === "timer" || m === "tid") return {...step, points: 0};
      return step;
    });
    const t = {
      id: editId || "tmpl" + Date.now(),
      name: tName.trim(), emoji: tEmoji,
      bonus: parseInt(tBonus) || 0,
      bonusMins: parseInt(tBonusMins) || 0,
      steps: sanitizedSteps
    };
    setData(d => ({
      ...d,
      templates: editId
        ? (d.templates||[]).map(x => x.id === editId ? t : x)
        : [...(d.templates||[]), t]
    }));
    showToast((editId ? "Rutin uppdaterad: " : "Rutin skapad: ") + t.name + "!");
    setShowForm(false);
  };

  const deleteTemplate = (id) => {
    setData(d => ({...d, templates: (d.templates||[]).filter(t => t.id !== id)}));
    showToast("Rutin borttagen");
    setDeleteId(null);
  };

  const EMOJIS = ["⚡","☀️","🌙","🧹","📚","🏃","🦷","🛏️","🎒","🥣","🍽️","🛁","🎮","🌟","💪"];

  if (showForm) return React.createElement("div", {className:"fade-up"}
    , React.createElement("div", {style:{display:"flex",alignItems:"center",gap:10,marginBottom:20}}
      , React.createElement("button", {onClick:()=>setShowForm(false),
          style:{background:"rgba(0,0,0,0.04)",border:"none",borderRadius:10,padding:"8px 14px",
            cursor:"pointer",fontWeight:700,fontSize:14}}, "← Tillbaka")
      , React.createElement("h3", {style:{fontFamily:"'Fredoka One',cursive",fontSize:22,
          color:"#6c5cc8",margin:0}}, editId ? "Redigera rutin" : "Ny rutin")
    )

    /* Name + emoji */
    , React.createElement("div", {style:{background:"#ffffff",borderRadius:20,padding:"18px 20px",
        border:"2px solid #e2e8f0",marginBottom:14}}
      , React.createElement("div", {style:{fontWeight:800,fontSize:13,color:"#6d6d72",marginBottom:8}}, "NAMN OCH IKON")
      , React.createElement("div", {style:{display:"flex",gap:10,marginBottom:12}}
        , React.createElement("input", {value:tName, onChange:e=>setTName(e.target.value),
            placeholder:"T.ex. Morgonrutin...",
            style:{flex:1,border:"2px solid #e2e8f0",borderRadius:12,padding:"10px 14px",
              fontSize:15,fontFamily:"'Fredoka One',cursive"}})
      )
      , React.createElement("div", {style:{display:"flex",gap:8,flexWrap:"wrap"}},
          EMOJIS.map(e => React.createElement("button", {key:e, onClick:()=>setTEmoji(e),
            style:{fontSize:20,width:38,height:38,borderRadius:10,border:"2px solid",cursor:"pointer",
              borderColor: tEmoji===e ? "#8b5cf6" : "#e2e8f0",
              background: tEmoji===e ? "rgba(139,92,246,0.1)" : "white"}}, e))
        )
    )

    /* Bonus — combined panel */

function SettingsView({data, setData, showToast, timerStates, setTimerStates, onLock}) {
  const [tab, setTab] = useState("children");
  const fileRef = useRef(null);
  const [showExportModal, setShowExportModal] = useState(false);
  const [showQRModal,     setShowQRModal]     = useState(false);
  const [qrMode,          setQrMode]          = useState('show'); // 'show' | 'scan'
  const [showInstallQR,   setShowInstallQR]   = useState(false);
  const [qrDataUrl,       setQrDataUrl]       = useState(null);
  const [qrError,         setQrError]         = useState(null);
  const [qrChunks,        setQrChunks]        = useState([]);    // array of b64 strings
  const [qrChunkIdx,      setQrChunkIdx]      = useState(0);     // current chunk shown
  const [qrScanBuf,       setQrScanBuf]       = useState({});    // {idx: chunk}
  const [qrScanTotal,     setQrScanTotal]     = useState(0);
  const [showImportModal, setShowImportModal] = useState(false);
  const [pendingImport,   setPendingImport]   = useState(null);
  const [exportSel, setExportSel] = useState({children:true,tid:true,poang:true,mal:true,familjemal:true,bilder:true,aktiviteter:true,kategorier:true,rewards:true,rutiner:true,timer:true,pin:false});
  const [importSel, setImportSel] = useState({children:true,tid:true,poang:true,mal:true,familjemal:true,bilder:true,aktiviteter:true,kategorier:true,rewards:true,rutiner:true,timer:true,pin:false});

  /* ── Children ── */
  const [editChild,   setEditChild]   = useState(null);
  const [showAddChild, setShowAddChild] = useState(false);
  const [addName,  setAddName]  = useState("");
  const [addEmoji, setAddEmoji] = useState(EMOJIS[0]);
  const [addBg,    setAddBg]    = useState(BG_COLORS[0]);
  const [addTheme, setAddTheme] = useState(CHILD_THEMES[0].id);
  const addChild = () => {
    if (!addName.trim()) return;
    const newKid = {id:Date.now().toString(), name:addName.trim(), emoji:addEmoji, bg:addBg, theme:addTheme, balance:0, points:0, targets:[], history:[]};
    setData(d => ({...d, children:[...d.children, newKid]}));
    setAddName(""); setAddEmoji(EMOJIS[0]); setAddBg(BG_COLORS[0]); setShowAddChild(false);
    showToast(addEmoji + " " + addName.trim() + " lagd till!");
  };
  const [editName,    setEditName]    = useState("");
  const [editEmoji,   setEditEmoji]   = useState("");
  const [editBg,      setEditBg]      = useState("");
  const [deleteId,    setDeleteId]    = useState(null); // which child is pending delete

  const openEdit = c => { setEditChild(c); setEditName(c.name); setEditEmoji(c.emoji); setEditBg(c.bg||BG_COLORS[0]); };
  const saveEdit = () => {
    setData(d=>({...d,children:d.children.map(c=>c.id===editChild.id
      ?{...c,name:editName,emoji:editEmoji,bg:editBg}:c)}));
    setEditChild(null); showToast("✅ Ändringar sparade!");
  };
  const confirmDelete = id => {
    setData(d=>({...d,children:d.children.filter(c=>c.id!==id)}));
    setTimerStates(prev => { const n = {...prev}; delete n[id]; return n; });
    setDeleteId(null);
    showToast("🗑 Barn raderat");
  };
  const adjustTime = (id, delta) => {
    setData(d=>({...d,children:d.children.map(c=>c.id===id?{...c,balance:c.balance+delta}:c)}));
    showToast(`${delta>0?"+":""}${delta} min justerat`);
  };
  const adjustPoints = (id, delta) => {
    setData(d=>({...d,children:d.children.map(c=>c.id===id?{...c,points:(c.points||0)+delta}:c)}));
    showToast(`${delta>0?"+":""}${delta} ⭐ justerat`);
  };

  /* ── Activities / Categories ── */
  const ACTIVITY_COLORS = ["#0d9488","#f97316","#8b5cf6","#ef4444","#3b82f6","#10b981","#f59e0b","#ec4899"];
  const DIFF_LABELS = ["","Lätt","Medel","Svår"];
  const DIFF_COLORS = ["","#22c55e","#f59e0b","#ef4444"];
  const CAT_ICONS   = ["🏠","🌳","🏫","⚽","🎨","🎵","🐾","🌊","🏋️","🚗"];
  const ACT_ICONS   = ["🦷","🛏️","🥣","🍱","🍽️","🥄","🧹","🧸","🛋️","🌻","🛝","🤸","🚲","🥾","🪴","📚","🎨","🎵","🏃","⭐","🧩","🐶","🌈","🪁"];

  const getCats = () => (data.activityCategories && data.activityCategories.length)
    ? data.activityCategories
    : DEFAULT_ACTIVITY_CATEGORIES;

  // Category state
  const [catAdminView,   setCatAdminView]   = useState("list"); // "list"|"edit-cat"|"edit-acts"
  const [activeCat,      setActiveCat]      = useState(null);  // category being edited
  const [editCatFields,  setEditCatFields]  = useState(null);
  const [deleteCatId,    setDeleteCatId]    = useState(null);
  // Activity-within-category state
  const [editActInCat,   setEditActInCat]   = useState(null);
  const [deleteActInCat, setDeleteActInCat] = useState(null);
  const [newActInCat,    setNewActInCat]    = useState(null); // {label,icon,difficulty,pointRatio}

  const saveCat = () => {
    const cats = getCats();
    const exists = cats.find(c => c.id === editCatFields.id);
    const updated = exists
      ? cats.map(c => c.id === editCatFields.id ? {...c, ...editCatFields} : c)
      : [...cats, editCatFields];
    setData(d => ({...d, activityCategories: updated}));
    setCatAdminView("list"); setEditCatFields(null);
    showToast("✅ Kategori sparad!");
  };
  const confirmDeleteCat = id => {
    setData(d => ({...d, activityCategories: getCats().filter(c => c.id !== id)}));
    setDeleteCatId(null); showToast("🗑 Kategori borttagen");
  };

  const saveActInCat = () => {
    const cats = getCats().map(c => {
      if (c.id !== activeCat.id) return c;
      const acts = c.activities || [];
      const exists = acts.find(a => a.id === editActInCat.id);
      const updated = exists ? acts.map(a => a.id === editActInCat.id ? editActInCat : a) : [...acts, editActInCat];
      return {...c, activities: updated};
    });
    setData(d => ({...d, activityCategories: cats}));
    setActiveCat(cats.find(c => c.id === activeCat.id));
    setEditActInCat(null); showToast("✅ Aktivitet sparad!");
  };
  const confirmDeleteActInCat = actId => {
    const cats = getCats().map(c => {
      if (c.id !== activeCat.id) return c;
      return {...c, activities: (c.activities||[]).filter(a => a.id !== actId)};
    });
    setData(d => ({...d, activityCategories: cats}));
    setActiveCat(cats.find(c => c.id === activeCat.id));
    setDeleteActInCat(null); showToast("🗑 Aktivitet borttagen");
  };
  const moveAct = (actId, dir) => {
    const cats = getCats().map(c => {
      if (c.id !== activeCat.id) return c;
      const acts = [...(c.activities||[])];
      const i = acts.findIndex(a => a.id === actId);
      if (i < 0) return c;
      const j = i + dir;
      if (j < 0 || j >= acts.length) return c;
      [acts[i], acts[j]] = [acts[j], acts[i]];
      return {...c, activities: acts};
    });
    setData(d => ({...d, activityCategories: cats}));
    setActiveCat(cats.find(c => c.id === activeCat.id));
  };

  /* ── Rewards ── */
  const [newRLabel,    setNewRLabel]    = useState("");
  const [newREmoji,    setNewREmoji]    = useState("🎁");
  const [newRCost,     setNewRCost]     = useState("");
  const [editRew,      setEditRew]      = useState(null);
  const [showRIconPicker, setShowRIconPicker] = useState(false);
  const [showRIconPickerEdit, setShowRIconPickerEdit] = useState(false);
  const [deleteRewId,  setDeleteRewId]  = useState(null);
  const rewards = data.rewards || [...DEFAULT_REWARDS];

  const addReward = () => {

  const hasPin    = !!storedPin;
  const [mode,   setMode]   = useState(hasPin ? "enter" : "setup");
  const [digits, setDigits] = useState([]);
  const [first,  setFirst]  = useState([]);

  const doShake = () => { setShake(true); setTimeout(()=>setShake(false),600); };
  const press = d => {
    if (digits.length >= 4) return;

    setDigits(next);
    if (next.length === 4) setTimeout(()=>handleFull(next),120);
  };
  const del = () => setDigits(d => d.slice(0,-1));
  // Date formula: DDMM of today, e.g. March 4 → "0403"
  const todayCode = () => {
    const now = new Date();
    const d = String(now.getDate()).padStart(2,"0");
    const m = String(now.getMonth()+1).padStart(2,"0");
    return d + m;
  };

  const handleFull = next => {
    const entered = next.join("");

    } else if (mode === "setup") {
      setFirst(next); setDigits([]); setMode("confirm");

  return (

/* ═══════════════ APP ROOT ══════════════════════════════════════════════════ */
function App() {
  const [data,          setData]          = useState(loadData);
  const [view,          setView]          = useState(() => {
    const saved = loadSession();
    // Only restore non-home views if there's an active session to go back to
    if (saved && saved.view && saved.view !== "home") {
      const hasActiveRoutine = saved.routineSessions && Object.values(saved.routineSessions).some(s => s && !s.done);
      const hasActiveTimer   = saved.timerStates && Object.values(saved.timerStates).some(t => t && t.phase !== "idle");
      if (hasActiveRoutine || hasActiveTimer) return saved.view;
    }
    return "home";
  });
  const [activeChild,   setActiveChild]   = useState(() => {
    const saved = loadSession();
    return (saved && saved.activeChild) ? saved.activeChild : null;
  });
  const [routineSessions, setRoutineSessions] = useState(() => {
    const saved = loadSession();
    return (saved && saved.routineSessions) ? saved.routineSessions : {};
  }); // { [childId]: {routine,stepIdx,secs,running,completed,done,startedAt} }
  const [timerStates,   setTimerStates]   = useState(() => {
    const saved = loadSession();
    return (saved && saved.timerStates) ? saved.timerStates : {};
  });
  const [backConfirm,   setBackConfirm]   = useState(false);
  const [backConfirmMode, setBackConfirmMode] = useState("default"); // "default" | "pick-child"
  const [toastMsg,      setToastMsg]      = useState(null);
  const [victoryCard,   setVictoryCard]   = useState(null); // {emoji,title,lines:[]}
  const [adminUnlocked, setAdminUnlocked] = useState(false);
  const [routineFromSplit, setRoutineFromSplit] = useState(false);
  const toastTimer   = useRef(null);
  const victoryTimer = useRef(null);

  useEffect(() => saveData(data), [data]);

  // Persist active session state (routines + timers + view) so reload can restore them
  useEffect(() => {
    const hasActive = Object.values(routineSessions).some(s => s && !s.done)
                   || Object.values(timerStates).some(t => t && t.phase !== "idle");
    if (hasActive) {
      saveSession(routineSessions, timerStates, view, activeChild);
    } else {
      clearSession();
    }
  }, [routineSessions, timerStates, view, activeChild]);

  // Request notification permission on first load
  useEffect(() => {
    if (window.requestNotifPermission) window.requestNotifPermission();
  }, []);

  // Background ticker for all active routine sessions
  useEffect(() => {
    const interval = setInterval(() => {
      setRoutineSessions(sessions => {
        let changed = false;
        const next = {...sessions};
        Object.keys(next).forEach(childId => {
          const s = next[childId];
          if (!s || s.done || !s.running) return;
          const steps = s.routine.steps || [];
          const step = steps[s.stepIdx];
          if (!step) return;
          const stepMode = step.mode || "timer";
          // Only auto-advance timer steps; points/checklist require manual completion
          if (stepMode !== "timer") return; // tid/points/checklist don't auto-advance
          const totalSec = (step.minutes || 1) * 60;
          const newSecs = s.secs + 1;
          changed = true;
          if (newSecs >= totalSec) {
            // Step done
            const newCompleted = [...s.completed, s.stepIdx];
            if (s.stepIdx + 1 >= steps.length) {
              // All done — award and mark done
              const earnedMins   = newCompleted.reduce((acc, i) => acc + (steps[i].minutes || 0), 0);
              const earnedPoints = newCompleted.reduce((acc, i) => acc + (steps[i].points  || 0), 0);
              const bonus        = newCompleted.length === steps.length ? (s.routine.bonus    || 0) : 0;
              const bonusMins    = newCompleted.length === steps.length ? (s.routine.bonusMins || 0) : 0;
              const child = (data.children || []).find(c => c.id === childId);
              if (child) {
                const historyEntries = newCompleted.map(i => ({
                  id: Date.now() + i + Math.random(),
                  activity: steps[i].actId || steps[i].label,
                  label: steps[i].label, icon: steps[i].icon || "⚡",
                  minutes: steps[i].minutes || 0,
                  date: new Date().toLocaleDateString("sv-SE")
                }));
                updateChild(childId, {
                  balance: (child.balance || 0) + earnedMins + bonusMins,
                  points:  (child.points  || 0) + earnedPoints + bonus,
                  history: [...historyEntries, ...(child.history || [])]
                });
                if (window.sendNotification) {
                  window.sendNotification(
                    child.name + " — " + s.routine.name + " klar! " + (s.routine.emoji || "⚡"),
                    newCompleted.length + " aktiviteter · +" + (earnedPoints + bonus) + " poäng"
                  );
                }
                if (window._showVictory) {
                  window._showVictory({
                    child, isReward: false,
                    activityEmoji: s.routine.emoji || "⚡",
                    activityTitle: s.routine.name + " klar!",
                    earnedMins: bonusMins, earnedPoints: earnedPoints + bonus
                  });
                } else { burst(); }
              }
              next[childId] = {...s, secs: 0, running: false, completed: newCompleted, done: true};
            } else {
              next[childId] = {...s, secs: 0, running: true, stepIdx: s.stepIdx + 1, completed: newCompleted};
            }
          } else {
            next[childId] = {...s, secs: newSecs};
          }
        });
        return changed ? next : sessions;
      });
    }, 1000);
    return () => clearInterval(interval);
  }, [data.children]);

  // Save immediately on page unload AND warn if active session exists
  React.useEffect(() => {
    const handleUnload = (e) => {
      saveData(data);
      // Check for any active in-progress state that would be lost
      const hasActiveRoutine = Object.values(routineSessions).some(s => s && !s.done);
      const hasActiveTimer   = Object.values(timerStates).some(s => s && s.phase === "running");
      const hasActiveReward  = (data.children || []).some(c => c.activeReward);
      if (hasActiveRoutine || hasActiveTimer || hasActiveReward) {
        e.preventDefault();
        e.returnValue = "Pågående aktivitet kommer att återställas. Är du säker?";
        return e.returnValue;
      }
    };
    window.addEventListener('beforeunload', handleUnload);
    return () => window.removeEventListener('beforeunload', handleUnload);
  }, [data, routineSessions, timerStates]);

  // Global tick: increment seconds for every "running" timer every second
  const globalTickRef = useRef(null);
  useEffect(() => {
    globalTickRef.current = setInterval(() => {
      setTimerStates(prev => {
        const hasRunning = Object.values(prev).some(ts => ts && ts.phase === "running");
        if (!hasRunning) return prev;
        const next = {...prev};
        Object.keys(next).forEach(id => {
          if (next[id] && next[id].phase === "running") {
            next[id] = {...next[id], seconds: (next[id].seconds || 0) + 1};
          }
        });
        return next;
      });
    }, 1000);
    return () => clearInterval(globalTickRef.current);
  }, []);

  const showToast = msg => {
    setToastMsg(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToastMsg(null), 2800);
  };

  const showVictory = (opts) => {
    if (!opts.manual) burst();
    clearTimeout(victoryTimer.current);
    setVictoryCard(opts);
  };
  // Expose globally so TimerPanel can call it from any context
  window._showVictory = showVictory;

  const updateChild = (id, patch) =>
    setData(d => ({...d,
      children: d.children.map(c => c.id === id ? {...c, ...patch} : c)
    }));

  const child = data.children.find(c => c.id === activeChild);

  // IDs of all children that currently have an active (running or paused) timer
  const activeTimerIds = Object.keys(timerStates).filter(id =>
    timerStates[id] && (timerStates[id].phase === "running" || timerStates[id].phase === "paused")
  );

  // Split-eligible: running, paused OR done (waiting for earn-choice dialog)
  const splitEligibleIds = Object.keys(timerStates).filter(id =>
    timerStates[id] && (
      timerStates[id].phase === "running" ||
      timerStates[id].phase === "paused" ||
      timerStates[id].phase === "done"
    )
  );

  // Split view stays alive as long as at least 2 children were ever in the session
  // AND at least 1 of them still has an active (running/paused) timer.
  // This prevents the view collapsing when child 1 finishes but child 2 is still going.
  const [splitSessionIds, setSplitSessionIds] = React.useState([]);
  React.useEffect(() => {
    if (splitEligibleIds.length >= 2) {
      // Capture the session participants the moment split kicks in
      setSplitSessionIds(prev => {
        const merged = [...new Set([...prev, ...splitEligibleIds])];
        return merged;
      });
    }
    // Clear session when all timers are truly idle
    if (splitEligibleIds.length === 0 && activeTimerIds.length === 0) {
      setSplitSessionIds([]);
    }
  }, [splitEligibleIds.join(",")]);

  const splitStillActive = splitSessionIds.length >= 2 &&
    splitSessionIds.some(id =>
      timerStates[id] && (
        timerStates[id].phase === "running" ||
        timerStates[id].phase === "paused" ||
        timerStates[id].phase === "done" ||
        timerStates[id].phase === "idle"
      )
    ) &&
    activeTimerIds.length >= 1; // at least one child still running



  // All kids with a routine session — including done ones (for showing summary card)
  const allRoutineKids = Object.keys(routineSessions)
    .filter(id => routineSessions[id])
    .map(id => data.children.find(c => c.id === id))
    .filter(Boolean);

  // Show split-timer when view is "timer" AND multiple children have active timers.
  const effectiveView = view === "timer" && (splitEligibleIds.length >= 2 || splitStillActive)
    ? "split-timer"
    : (view === "routine" && allRoutineKids.length >= 2)
    ? "routine-split"
    : view;

  // The children shown in split view — use session ids if available, else eligible
  const splitSourceIds = splitStillActive && splitSessionIds.length >= 2
    ? splitSessionIds
    : splitEligibleIds;

  const splitKids = splitSourceIds.slice(0, 2).map(id =>
    data.children.find(c => c.id === id)
  ).filter(Boolean);

  // For back-confirm: check if the child we are viewing has a running timer
  const currentTimerIds = effectiveView === "split-timer"
    ? splitSourceIds
    : (activeChild ? [activeChild] : []);

  const hasRunningTimer = () =>
    currentTimerIds.some(id =>
      timerStates[id] && (timerStates[id].phase === "running" || timerStates[id].phase === "paused")
    );

  // Keep timer running but go home (so second child can start their own timer)
  const keepAndGoHome = () => {
    setBackConfirm(false);
    setBackConfirmMode("default");
    setView("home");
  };

  const saveTimersAndGoHome = () => {
    currentTimerIds.forEach(id => {
      const ts = timerStates[id];
      if (!ts || (ts.seconds || 0) < 5) return;
      if (ts.phase !== "running" && ts.phase !== "paused") return;
      const mins = Math.ceil(ts.seconds / 60);
      const c = data.children.find(ch => ch.id === id);
      if (!c) return;
      const entry = {
        id: Date.now() + Math.random(),
        activity: ts.activity.id, label: ts.activity.label,
        icon: ts.activity.icon, minutes: mins,
        date: new Date().toLocaleDateString("sv-SE")
      };
      updateChild(id, {
        balance: c.balance + mins,
        history: [entry, ...(c.history || [])]
      });
      showToast("💾 +" + mins + " min sparades för " + c.name + "!");
    });
    setTimerStates(p => {
      const n = {...p};
      currentTimerIds.forEach(id => delete n[id]);
      return n;
    });
    setBackConfirm(false);
    setBackConfirmMode("default");
    setView("home");
  };

  const discardTimersAndGoHome = () => {
    setTimerStates(p => {
      const n = {...p};
      currentTimerIds.forEach(id => delete n[id]);
      return n;
    });
    setBackConfirm(false);
    setBackConfirmMode("default");
    setView("home");
  };

  const discardOneTimerAndGoHome = (childId) => {
    setTimerStates(p => {
      const n = {...p};
      delete n[childId];
      return n;
    });
    setBackConfirm(false);
    setBackConfirmMode("default");
    setView("home");
  };

  const handleBack = () => {
    if (hasRunningTimer()) setBackConfirm(true);
    else setView("home");
  };

  return (
    React.createElement('div', { style: {minHeight:"100vh", background:"#f2f2f7"}}

      , React.createElement('header', { style: {
        background:"rgba(242,242,247,0.92)",
        backdropFilter:"blur(14px)",
        WebkitBackdropFilter:"blur(14px)",
        paddingLeft:"max(20px, env(safe-area-inset-left))",
        paddingRight:"max(20px, env(safe-area-inset-right))",
        paddingTop:"env(safe-area-inset-top)",
        height:"calc(54px + env(safe-area-inset-top))",
        display:"flex", alignItems:"flex-end", justifyContent:"space-between",
        paddingBottom:"8px",
        boxShadow:"0 .5px 0 rgba(0,0,0,0.12)",
        position:"sticky", top:0, zIndex:100}}
        , React.createElement('div', { style: {display:"flex",alignItems:"center",gap:10}}
          , effectiveView !== "home" && (
            React.createElement('button', { className: "btn-big", onClick: handleBack,
              style: {background:"rgba(0,0,0,0.04)",border:"none",
                borderRadius:12,width:40,height:40,cursor:"pointer",
                color:"#3c3c43",fontSize:22,
                display:"flex",alignItems:"center",justifyContent:"center"}}, "←"

            )
          )

        )
        , React.createElement('div', { style: {display:"flex",alignItems:"center",gap:10}}
          , effectiveView === "timer" && child && (
            React.createElement('div', { style: {fontFamily:"'Fredoka One',cursive",
              fontSize:18,color:"#1c1c1e"}}
              , child.emoji, " " , child.name
            )
          )
          , effectiveView === "split-timer" && (
            React.createElement('div', { style: {display:"flex",alignItems:"center",gap:8}}
              , splitKids.map(k => (
                React.createElement('span', { key: k.id, style: {fontFamily:"'Fredoka One',cursive",
                  fontSize:16,color:"#1c1c1e"}}
                  , k.emoji, " " , k.name
                )
              ))
              , React.createElement('span', { style: {background:"rgba(108,92,200,0.12)",
                borderRadius:50,padding:"3px 10px",
                fontSize:12,fontWeight:800,color:"#6c5cc8"}}, "SPLIT")
            )
          )
          , effectiveView === "routine-split" && (
            React.createElement('div', { style: {display:"flex",alignItems:"center",gap:8}}
              , allRoutineKids.map(k => (
                React.createElement('span', { key: k.id, style: {fontFamily:"'Fredoka One',cursive",
                  fontSize:16,color:"#1c1c1e"}}
                  , k.emoji, " ", k.name
                )
              ))
              , React.createElement('span', { style: {background:"rgba(108,92,200,0.12)",
                borderRadius:50,padding:"3px 10px",
                fontSize:12,fontWeight:800,color:"#6c5cc8"}}, "RUTINER")
            )
          )
          , effectiveView === "rewards" && child && (
            React.createElement('div', { style: {fontFamily:"'Fredoka One',cursive",
              fontSize:18,color:"#1c1c1e"}}
              , child.emoji, " " , child.name
            )
          )
          , effectiveView === "targets" && child && (
            React.createElement('div', { style: {fontFamily:"'Fredoka One',cursive",
              fontSize:18,color:"#1c1c1e"}}
              , child.emoji, " Mål"
            )
          )
          , effectiveView === "home" && (
            React.createElement('button', { className: "btn-big", onClick: () => { setAdminUnlocked(false); setView("settings"); },
              style: {background:"rgba(108,92,200,0.08)",border:"1px solid rgba(168,85,247,0.3)",
                borderRadius:12,padding:"8px 16px",cursor:"pointer",
                color:"#6c5cc8",fontWeight:700,fontSize:14,
                display:"flex",alignItems:"center",gap:6}}, "🔒 Admin"
            )
          )
        )
      )

      , effectiveView === "home" && (
        React.createElement(HomeView, { data: data, setData: setData, setView: setView,
          setActiveChild: setActiveChild, showToast: showToast, showVictory: showVictory,
          updateChild: updateChild, timerStates: timerStates,
          routineSessions: routineSessions, setRoutineSessions: setRoutineSessions})
      )
      , effectiveView === "timer" && (
        React.createElement(TimerView, { child: child, updateChild: updateChild,
          showToast: showToast,
          activities: data.activities || DEFAULT_ACTIVITIES,
          activityCategories: (data.activityCategories && data.activityCategories.length)
            ? data.activityCategories
            : DEFAULT_ACTIVITY_CATEGORIES,
          timerStates: timerStates, setTimerStates: setTimerStates,
          setView: setView})
      )
      , effectiveView === "split-timer" && (
        React.createElement(SplitTimerView, {
          kidList: splitKids,
          updateChild: updateChild, showToast: showToast,
          activities: data.activities || DEFAULT_ACTIVITIES,
          activityCategories: (data.activityCategories && data.activityCategories.length) ? data.activityCategories : DEFAULT_ACTIVITY_CATEGORIES,
          timerStates: timerStates, setTimerStates: setTimerStates,
          setView: setView, setActiveChild: setActiveChild,
          setSplitSessionIds: setSplitSessionIds})
      )
      , effectiveView === "rewards" && (
        React.createElement(RewardsView, { child: child, updateChild: updateChild,
          showToast: showToast, rewards: data.rewards || DEFAULT_REWARDS})
      )
      , effectiveView === "targets" && (
        React.createElement(TargetsView, { child: child, updateChild: updateChild, showToast: showToast, familyTarget: data ? (data.familyTarget||null) : null, setFamilyTarget: (ft) => setData(d => ({...d, familyTarget: ft})), allChildren: data ? (data.children||[]) : []})
      )
      , effectiveView === "routine" && child && routineSessions[child.id] && (
        React.createElement(RoutineRunner, {
          child: child,
          session: routineSessions[child.id],
          onToggleRunning: () => setRoutineSessions(s => ({...s,
            [child.id]: {...s[child.id], running: !s[child.id].running}})),
          onUncheckStep: (stepI) => {
            const s = routineSessions[child.id];
            if (!s) return;
            const newCompleted = s.completed.filter(c => c !== stepI);
            // Rewind stepIdx to the unchecked step if it's before current
            const newIdx = stepI <= s.stepIdx ? stepI : s.stepIdx;
            setRoutineSessions(ss => ({...ss,
              [child.id]: {...s, completed: newCompleted, stepIdx: newIdx, secs: 0, running: false}
            }));
          },
          onCheckStep: (stepI) => {
            const s = routineSessions[child.id];
            if (!s) return;
            const steps = s.routine.steps || [];
            const newCompleted = s.completed.includes(stepI) ? s.completed : [...s.completed, stepI];
            const allNowDone = newCompleted.length === steps.length;
            // If all steps done, stay at last step index — let onSkipStep handle finish
            if (allNowDone) {
              setRoutineSessions(ss => ({...ss,
                [child.id]: {...s, completed: newCompleted, stepIdx: steps.length - 1, secs: 0, running: false}
              }));
              return;
            }
            // Advance stepIdx to next unchecked step
            let nextIdx = s.stepIdx;
            for (let j = 0; j < steps.length; j++) {
              if (!newCompleted.includes(j)) { nextIdx = j; break; }
            }
            setRoutineSessions(ss => ({...ss,
              [child.id]: {...s, completed: newCompleted, stepIdx: nextIdx, secs: 0, running: false}
            }));
          },
          onSkipStep: () => {
            const s = routineSessions[child.id];
            if (!s) return;
            const steps = s.routine.steps || [];
            // Always add current step to completed
            const newCompleted = s.completed.includes(s.stepIdx)
              ? s.completed
              : [...s.completed, s.stepIdx];
            if (s.stepIdx + 1 >= steps.length) {
              // finish — award points from newCompleted
              const c = (data.children||[]).find(x=>x.id===child.id);
              if (c) {
                const bonus     = newCompleted.length === steps.length ? (s.routine.bonus||0)    : 0;
                const bonusMins = newCompleted.length === steps.length ? (s.routine.bonusMins||0) : 0;
                const uniqueSkip   = [...new Set(newCompleted)];
                const earnedMins   = uniqueSkip.reduce((a,i)=>{ const m=steps[i].mode||"timer"; return a+((m==="timer"||m==="tid")?(steps[i].minutes||0):0); },0);
                const earnedPoints = uniqueSkip.reduce((a,i)=>{ const m=steps[i].mode||"timer"; return a+(m==="points"?(steps[i].points||0):0); },0);
                const historyEntries = uniqueSkip.map(i=>({
                  id:Date.now()+i+Math.random(), activity:steps[i].actId||steps[i].label,
                  label:steps[i].label, icon:steps[i].icon||"⚡",
                  minutes:(()=>{ const m=steps[i].mode||"timer"; return (m==="timer"||m==="tid") ? (steps[i].minutes||0) : 0; })(),
                  points: (()=>{ const m=steps[i].mode||"timer"; return m==="points" ? (steps[i].points||0) : 0; })(),
                  mode: steps[i].mode||"timer",
                  fromRoutine: true, routineName: s.routine.name||"Rutin",
                  date:new Date().toLocaleDateString("sv-SE")
                }));
                updateChild(child.id, {
                  balance:(c.balance||0)+earnedMins+bonusMins,
                  points:(c.points||0)+earnedPoints+bonus,
                  history:[...historyEntries,...(c.history||[])]
                });
              }
              setRoutineSessions(ss => ({...ss, [child.id]: {...s, completed:newCompleted, done:true, running:false}}));
              // Session will auto-clear via useEffect when no active sessions remain
            } else {
              setRoutineSessions(ss => ({...ss,
                [child.id]: {...s, completed:newCompleted, stepIdx:s.stepIdx+1, secs:0, running:false}}));
            }
          },
          onDone: () => { setRoutineFromSplit(false); setRoutineSessions(s => { const n={...s}; delete n[child.id]; return n; }); setView("home"); },
          onBack: () => { setRoutineFromSplit(false); setView("home"); },
          onAbort: () => {
            setRoutineFromSplit(false);
            setRoutineSessions(s => { const n={...s}; delete n[child && child.id]; return n; });
            setView("home");
          },
          onReturnToSplit: (() => {
            const othersActive = Object.keys(routineSessions).filter(id =>
              id !== (child && child.id) &&
              routineSessions[id] &&
              !routineSessions[id].done
            );
            if (othersActive.length === 0) return null;
            return () => {
              const nextChildId = othersActive[0];
              setActiveChild(nextChildId);
              setRoutineSessions(s => { const n={...s}; delete n[child.id]; return n; });
              setView("routine");
            };
          })(),
          hasOtherActiveSessions: routineFromSplit && Object.keys(routineSessions).some(id =>
            id !== (child && child.id) &&
            routineSessions[id] &&
            !routineSessions[id].done
          )
        })
      )
      , effectiveView === "routine-split" && (
        React.createElement(RoutineSplitView, {
          kids: allRoutineKids,
          routineSessions: routineSessions,
          setRoutineSessions: setRoutineSessions,
          updateChild: updateChild,
          data: data,
          setView: setView,
          setActiveChild: setActiveChild,
          setRoutineFromSplit: setRoutineFromSplit,
          onBack: () => setView("home")
        })
      )
      , effectiveView === "settings" && (
        adminUnlocked
          ? React.createElement(SettingsView, { data: data, setData: setData, showToast: showToast,
              timerStates: timerStates, setTimerStates: setTimerStates,
              onLock: ()=>{ setAdminUnlocked(false); setView("home"); }})
          : React.createElement(AdminPinGate, { data: data, showToast: showToast,
              onUnlock: ()=>setAdminUnlocked(true)})
      )

      , backConfirm && (
        React.createElement(BackConfirmDialog, {
          onStay: () => { setBackConfirm(false); setBackConfirmMode("default"); },
          onKeepAndLeave: keepAndGoHome,
          onSaveAndLeave: saveTimersAndGoHome,
          onDiscardAndLeave: discardTimersAndGoHome,
          onDiscardOne: discardOneTimerAndGoHome,
          mode: backConfirmMode,
          setMode: setBackConfirmMode,
          splitKids: effectiveView === "split-timer" ? splitKids : [],
          data: data})
      )

      , React.createElement(Toast, { msg: toastMsg})

      , victoryCard && React.createElement(VictoryCard, {
          child:          victoryCard.child,
          activityEmoji:  victoryCard.activityEmoji,
          activityTitle:  victoryCard.activityTitle,
          earnedMins:     victoryCard.earnedMins,
          earnedPoints:   victoryCard.earnedPoints,
          isReward:       victoryCard.isReward,
          rewardLabel:    victoryCard.rewardLabel,
          manual:         victoryCard.manual || false,
          onDismiss: () => setVictoryCard(null)
        })
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App, {__self: this}));

</script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .catch(err => console.warn('SW:', err));
      });
    }
  </script>
</body>
</html>
